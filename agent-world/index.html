<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agent World — Rosie's Workshop</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a1a;
    font-family: 'Press Start 2P', monospace;
    overflow: hidden;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }
  .header {
    background: linear-gradient(180deg, #1e1e3a, #14142a);
    border-bottom: 3px solid #e94560;
    padding: 8px 16px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    z-index: 10;
    flex-shrink: 0;
  }
  .header h1 { font-size: 13px; color: #e94560; text-shadow: 1px 1px 0 #0f3460; }
  .header .info { font-size: 10px; color: #7a6a8a; }
  .canvas-wrap {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    background: #0a0a1a;
  }
  canvas {
    display: block;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
  }
  #tooltip {
    position: fixed;
    background: rgba(20,20,40,0.95);
    border: 2px solid #e94560;
    color: #fff;
    font-family: 'Press Start 2P', monospace;
    font-size: 10px;
    padding: 10px 14px;
    border-radius: 6px;
    pointer-events: none;
    z-index: 100;
    display: none;
    max-width: 280px;
    line-height: 1.8;
    box-shadow: 0 4px 20px rgba(0,0,0,0.5);
  }
  #tooltip .tt-name { color: #e94560; font-size: 11px; }
  #tooltip .tt-role { color: #8888aa; font-size: 9px; }
  #tooltip .tt-task { color: #4ECDC4; margin-top: 6px; font-size: 9px; }
  .chat-bubble {
    position: absolute;
    background: #fff;
    color: #1a1a2e;
    font-family: 'Press Start 2P', monospace;
    font-size: 9px;
    padding: 10px 12px;
    border-radius: 8px;
    max-width: 220px;
    line-height: 1.6;
    box-shadow: 3px 3px 0 rgba(0,0,0,0.25);
    animation: bubbleIn 0.3s ease-out, bubbleOut 0.5s ease-in 4.5s forwards;
    word-wrap: break-word;
    pointer-events: none;
  }
  .chat-bubble::after {
    content: '';
    position: absolute;
    top: 100%;
    left: 18px;
    border: 7px solid transparent;
    border-top-color: #fff;
  }
  .chat-bubble .speaker { font-weight: bold; margin-bottom: 4px; display: block; }
  @keyframes bubbleIn {
    from { opacity: 0; transform: translateY(5px) scale(0.9); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }
  @keyframes bubbleOut { from { opacity: 1; } to { opacity: 0; } }
</style>
</head>
<body>
<div class="header">
  <h1>🤖 AGENT WORLD — Rosie's Workshop</h1>
  <div class="info" id="clock"></div>
</div>
<div class="canvas-wrap"><canvas id="world"></canvas></div>
<div id="tooltip"></div>
<div id="chat-overlay" style="position:fixed;pointer-events:none;z-index:50;"></div>

<script>
// ============================================================
// HIGHER RES CONFIG
// ============================================================
const canvas = document.getElementById('world');
const ctx = canvas.getContext('2d');
const CW = 1280;
const CH = 720;
canvas.width = CW;
canvas.height = CH;

function resizeCanvas() {
  const hdr = document.querySelector('.header');
  const aW = window.innerWidth;
  const aH = window.innerHeight - hdr.offsetHeight;
  const s = Math.min(aW / CW, aH / CH);
  canvas.style.width = Math.floor(CW * s) + 'px';
  canvas.style.height = Math.floor(CH * s) + 'px';
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

// pixel helper
function px(x, y, w, h, color) {
  ctx.fillStyle = color;
  ctx.fillRect(Math.round(x), Math.round(y), w, h);
}

function pxGrad(x, y, w, h, c1, c2, vertical) {
  const grad = vertical
    ? ctx.createLinearGradient(x, y, x, y + h)
    : ctx.createLinearGradient(x, y, x + w, y);
  grad.addColorStop(0, c1);
  grad.addColorStop(1, c2);
  ctx.fillStyle = grad;
  ctx.fillRect(Math.round(x), Math.round(y), w, h);
}

function pxText(text, x, y, size, color, align) {
  ctx.fillStyle = color;
  ctx.font = `${size}px "Press Start 2P"`;
  ctx.textAlign = align || 'left';
  ctx.fillText(text, x, y);
  ctx.textAlign = 'left';
}

// ============================================================
// PALETTE
// ============================================================
const P = {
  // Floor
  floor1: '#c4a882', floor2: '#b89872', floor3: '#ae8e6a',
  // Walls
  wall1: '#6a8aaa', wall2: '#5a7a9a', wallBase: '#4a6a8a', wallTrim: '#3a5a7a',
  // Wood
  wood1: '#a0764e', wood2: '#8a6640', wood3: '#6e5030',
  // Rug
  rug1: '#7a2e2e', rug2: '#943838', rug3: '#5a2020',
};

// ============================================================
// DRAW ROOM
// ============================================================
function drawRoom() {
  // -- FLOOR --
  for (let y = 180; y < CH; y += 32) {
    for (let x = 0; x < CW; x += 32) {
      const checker = ((x/32|0) + (y/32|0)) % 2;
      px(x, y, 32, 32, checker ? P.floor1 : P.floor2);
      // Wood grain
      if (checker) {
        px(x + 4, y + 8, 24, 1, P.floor3);
        px(x + 8, y + 20, 18, 1, P.floor3);
      } else {
        px(x + 6, y + 12, 20, 1, '#c0a07a');
        px(x + 2, y + 24, 22, 1, '#c0a07a');
      }
    }
  }

  // -- WALLS --
  pxGrad(0, 0, CW, 180, '#7a9aba', '#5a7a9a', true);
  // Wainscoting
  px(0, 140, CW, 40, '#5a7a9a');
  px(0, 140, CW, 3, '#4a6a8a');
  px(0, 177, CW, 3, P.wallTrim);
  // Panel details
  for (let x = 0; x < CW; x += 80) {
    px(x + 4, 145, 72, 30, '#506e8e');
    px(x + 6, 147, 68, 26, '#5a7a9a');
  }

  // -- WINDOWS --
  drawWindow(80, 20, 160, 120);
  drawWindow(360, 20, 160, 120);
  drawWindow(760, 20, 160, 120);
  drawWindow(1040, 20, 160, 120);

  // -- AREA RUG (lounge) --
  drawRug(40, 430, 360, 250);

  // -- DESK RUG --
  px(440, 240, 340, 200, '#3a4a5a');
  px(444, 244, 332, 192, '#445566');

  // -- LOUNGE --
  drawCouch(60, 460, 280, 80);
  drawCouch(60, 600, 280, 80);
  drawCoffeeTable(160, 555);
  drawFloorLamp(45, 420);
  drawFloorLamp(350, 420);

  // -- WORK DESKS --
  drawWorkDesk(460, 260, '💻', 'CODE');
  drawWorkDesk(610, 260, '🔍', 'RESEARCH');

  // -- DESIGN STATION --
  drawEasel(830, 230);
  drawWorkDesk(900, 300, '🎨', 'DESIGN');

  // -- ROSIE'S DESK --
  drawBossDesk(500, 460);

  // -- SERVER RACK --
  drawServerRack(1100, 190);
  drawServerRack(1150, 190);
  drawServerRack(1200, 190);

  // -- BOOKSHELF --
  drawBookshelf(620, 10, 130, 165);

  // -- WHITEBOARD --
  drawWhiteboard(260, 18, 90, 120);

  // -- COFFEE STATION --
  drawCoffeeStation(960, 185);

  // -- PLANTS --
  drawPlant(30, 160, 1.2);
  drawPlant(1240, 160, 1.0);
  drawPlant(430, 430, 0.8);
  drawPlant(820, 460, 0.9);

  // -- WALL ART --
  drawWallArt(160, 30, '🦞', 50, 50);
  drawWallArt(930, 40, '🏀', 50, 50);

  // -- AREA LABELS --
  pxText('☕ LOUNGE', 140, 445, 10, 'rgba(255,255,255,0.25)', 'center');
  pxText('💻 CODE', 490, 250, 9, 'rgba(255,255,255,0.2)');
  pxText('🔍 RESEARCH', 625, 250, 9, 'rgba(255,255,255,0.2)');
  pxText('🎨 DESIGN', 860, 225, 9, 'rgba(255,255,255,0.2)');
  pxText('⚡ DEPLOY', 1120, 183, 9, 'rgba(255,255,255,0.2)');
  pxText('🤖 ROSIE', 530, 450, 9, 'rgba(255,255,255,0.2)');

  // -- CEILING LIGHTS --
  for (let lx = 200; lx < CW; lx += 320) {
    px(lx, 0, 4, 12, '#888');
    px(lx - 16, 12, 36, 6, '#e8d888');
    px(lx - 12, 18, 28, 3, '#c8b868');
    // Light cone
    ctx.fillStyle = 'rgba(255,240,200,0.03)';
    ctx.beginPath();
    ctx.moveTo(lx - 16, 18);
    ctx.lineTo(lx + 20, 18);
    ctx.lineTo(lx + 80, 180);
    ctx.lineTo(lx - 76, 180);
    ctx.fill();
  }
}

function drawWindow(x, y, w, h) {
  // Frame
  px(x - 4, y - 4, w + 8, h + 8, '#3a4a5a');
  px(x - 2, y - 2, w + 4, h + 4, '#4a5a6a');
  // Glass - sky gradient
  pxGrad(x, y, w, h, '#88c8e8', '#aaddff', true);
  // Clouds
  px(x + 20, y + 20, 40, 12, 'rgba(255,255,255,0.6)');
  px(x + 30, y + 14, 24, 10, 'rgba(255,255,255,0.5)');
  px(x + w - 60, y + 40, 30, 10, 'rgba(255,255,255,0.4)');
  // Panes
  px(x + w/2 - 2, y, 4, h, '#4a5a6a');
  px(x, y + h/2 - 2, w, 4, '#4a5a6a');
  // Sill
  px(x - 6, y + h, w + 12, 8, '#4a5a6a');
  px(x - 4, y + h, w + 8, 4, '#5a6a7a');
  // Curtain hints
  px(x - 10, y - 4, 12, h + 12, 'rgba(140,100,80,0.3)');
  px(x + w - 2, y - 4, 12, h + 12, 'rgba(140,100,80,0.3)');
}

function drawRug(x, y, w, h) {
  px(x, y, w, h, P.rug3);
  px(x + 6, y + 6, w - 12, h - 12, P.rug1);
  px(x + 14, y + 14, w - 28, h - 28, P.rug2);
  // Border pattern
  for (let i = 0; i < w - 20; i += 16) {
    px(x + 10 + i, y + 3, 8, 3, '#aa4444');
    px(x + 10 + i, y + h - 6, 8, 3, '#aa4444');
  }
  for (let i = 0; i < h - 20; i += 16) {
    px(x + 3, y + 10 + i, 3, 8, '#aa4444');
    px(x + w - 6, y + 10 + i, 3, 8, '#aa4444');
  }
}

function drawCouch(x, y, w, h) {
  // Shadow
  px(x + 6, y + h, w - 4, 6, 'rgba(0,0,0,0.15)');
  // Frame
  px(x, y, w, h, '#5a3a6a');
  // Back
  px(x, y, w, 16, '#4a2a5a');
  // Arms
  px(x, y, 18, h, '#4a2a5a');
  px(x + w - 18, y, 18, h, '#4a2a5a');
  // Cushions
  const cw = (w - 44) / 3;
  for (let i = 0; i < 3; i++) {
    const cx = x + 22 + i * (cw + 2);
    px(cx, y + 18, cw - 2, h - 22, '#7a5a8a');
    px(cx + 2, y + 20, cw - 6, h - 28, '#8a6a9a');
    // Highlight
    px(cx + 4, y + 22, cw - 10, 4, '#9a7aaa');
  }
  // Pillows
  px(x + 22, y + 16, 20, 20, '#c888a8');
  px(x + w - 44, y + 16, 20, 20, '#88a8c8');
}

function drawCoffeeTable(x, y) {
  px(x + 4, y + 40, 100, 6, 'rgba(0,0,0,0.12)');
  px(x, y, 108, 40, P.wood1);
  px(x + 2, y + 2, 104, 36, P.wood2);
  px(x + 2, y + 2, 104, 4, '#b88860');
  // Items
  px(x + 12, y + 10, 24, 18, '#e84848'); // magazine
  px(x + 14, y + 12, 20, 2, '#fff');
  px(x + 60, y + 8, 14, 14, '#eee'); // mug
  px(x + 74, y + 12, 5, 6, '#eee'); // handle
  px(x + 62, y + 4, 10, 6, 'rgba(180,160,140,0.4)'); // steam
  px(x + 84, y + 14, 16, 12, '#4888c8'); // phone
}

function drawFloorLamp(x, y) {
  // Pole
  px(x + 10, y + 24, 4, 50, '#888');
  px(x + 8, y + 72, 8, 4, '#666');
  // Shade
  px(x, y, 24, 24, '#e8d080');
  px(x + 2, y + 2, 20, 20, '#f0e0a0');
  // Glow
  ctx.fillStyle = 'rgba(255,240,180,0.06)';
  ctx.beginPath();
  ctx.arc(x + 12, y + 12, 50, 0, Math.PI * 2);
  ctx.fill();
}

function drawWorkDesk(x, y, emoji, label) {
  // Shadow
  px(x + 4, y + 68, 132, 6, 'rgba(0,0,0,0.12)');
  // Desktop
  px(x, y + 20, 136, 28, P.wood1);
  px(x + 2, y + 22, 132, 24, '#b08858');
  px(x + 2, y + 22, 132, 3, '#c0986a');
  // Front panel
  px(x + 4, y + 48, 128, 22, P.wood2);
  px(x + 20, y + 50, 96, 18, P.wood3);
  // Legs
  px(x + 6, y + 48, 8, 24, P.wood3);
  px(x + 122, y + 48, 8, 24, P.wood3);
  // Monitor
  px(x + 30, y - 8, 76, 30, '#222');
  px(x + 34, y - 5, 68, 24, '#2a4a6a');
  // Code on screen
  for (let i = 0; i < 4; i++) {
    const lw = 20 + Math.random() * 30;
    px(x + 38, y + i * 5, lw, 3, 'rgba(100,200,150,0.5)');
  }
  // Monitor stand
  px(x + 60, y + 22, 16, 6, '#333');
  px(x + 54, y + 26, 28, 4, '#2a2a2a');
  // Keyboard
  px(x + 42, y + 32, 52, 12, '#333');
  px(x + 44, y + 34, 48, 8, '#444');
}

function drawBossDesk(x, y) {
  // Shadow
  px(x + 6, y + 78, 212, 8, 'rgba(0,0,0,0.12)');
  // Desktop
  px(x, y + 24, 220, 30, '#8a6640');
  px(x + 2, y + 26, 216, 26, '#a07850');
  px(x + 2, y + 26, 216, 3, '#b89068');
  // Front panel
  px(x + 4, y + 54, 212, 26, P.wood2);
  px(x + 24, y + 58, 172, 18, P.wood3);
  // Legs
  px(x + 8, y + 54, 10, 28, P.wood3);
  px(x + 202, y + 54, 10, 28, P.wood3);
  // Dual monitors
  px(x + 30, y - 10, 70, 36, '#222');
  px(x + 33, y - 7, 64, 30, '#3a2a4a');
  px(x + 120, y - 10, 70, 36, '#222');
  px(x + 123, y - 7, 64, 30, '#3a2a4a');
  // Screen content
  for (let i = 0; i < 4; i++) {
    px(x + 37, y - 3 + i * 6, 16 + Math.random() * 30, 3, 'rgba(160,120,200,0.5)');
    px(x + 127, y - 3 + i * 6, 16 + Math.random() * 30, 3, 'rgba(100,180,160,0.5)');
  }
  // Stands
  px(x + 58, y + 26, 14, 5, '#333');
  px(x + 148, y + 26, 14, 5, '#333');
  // Mug
  px(x + 192, y + 30, 16, 16, '#e8e8e8');
  px(x + 208, y + 34, 6, 8, '#e8e8e8');
  px(x + 194, y + 26, 12, 6, 'rgba(180,160,140,0.4)');
  // Name plate
  px(x + 80, y + 60, 60, 14, '#c8a040');
  pxText('ROSIE', x + 84, y + 71, 7, '#4a3020');
  // Small plant
  px(x + 8, y + 28, 14, 16, '#48a848');
  px(x + 10, y + 38, 10, 8, '#b86838');
}

function drawEasel(x, y) {
  // Legs
  px(x + 6, y + 80, 6, 60, P.wood2);
  px(x + 48, y + 80, 6, 60, P.wood2);
  // Cross brace
  px(x + 6, y + 110, 48, 4, P.wood3);
  // Canvas
  px(x - 4, y, 68, 82, P.wood2);
  px(x, y + 2, 60, 76, '#f5f0e0');
  // Painting in progress
  pxGrad(x + 4, y + 6, 52, 30, '#88c8e8', '#5898c8', true); // sky
  px(x + 4, y + 36, 52, 20, '#48a848'); // hills
  px(x + 4, y + 56, 52, 18, '#c8a040'); // ground
  px(x + 20, y + 20, 16, 24, '#8a6a4a'); // tree trunk
  px(x + 10, y + 8, 36, 20, '#388838'); // tree top
  // Paint palette nearby
  px(x + 68, y + 100, 28, 20, P.wood1);
  const dots = ['#e84848','#4888c8','#48a848','#e8c848','#a848a8'];
  dots.forEach((c, i) => px(x + 72 + (i % 3) * 8, y + 104 + (i > 2 ? 8 : 0), 5, 5, c));
}

function drawServerRack(x, y) {
  px(x, y, 44, 120, '#2a2a3a');
  px(x + 2, y + 2, 40, 116, '#222238');
  // Rack units
  for (let i = 0; i < 5; i++) {
    const uy = y + 6 + i * 22;
    px(x + 4, uy, 36, 18, '#1a1a28');
    px(x + 4, uy, 36, 2, '#333348');
    // Blinky lights
    for (let j = 0; j < 4; j++) {
      const on = Math.random() > 0.3;
      const color = on ? (Math.random() > 0.7 ? '#e84848' : '#48e848') : '#1a1a1a';
      px(x + 8 + j * 8, uy + 6, 4, 4, color);
    }
    // Activity bar
    const bw = Math.random() * 24;
    px(x + 8, uy + 13, bw, 2, 'rgba(72,232,72,0.4)');
  }
  // Cables
  px(x + 38, y + 100, 3, 20, '#333');
  px(x + 34, y + 105, 3, 15, '#444');
}

function drawBookshelf(x, y, w, h) {
  px(x, y, w, h, '#5a3a1a');
  px(x + 3, y + 3, w - 6, h - 6, '#6a4a2a');
  // Shelves
  const shelfH = (h - 10) / 4;
  for (let i = 0; i < 4; i++) {
    const sy = y + 4 + i * shelfH;
    px(x + 2, sy + shelfH - 4, w - 4, 5, '#4a3018');
    // Books
    const colors = ['#c84848','#4888c8','#48a848','#c8a848','#a848a8','#c87848','#4ac8a8','#c848a8'];
    let bx = x + 6;
    for (let j = 0; j < 8 && bx < x + w - 10; j++) {
      const bw = 8 + Math.random() * 8;
      const bh = shelfH - 10 + Math.random() * 4;
      px(bx, sy + shelfH - 4 - bh, bw, bh, colors[j % colors.length]);
      // Spine detail
      px(bx + 2, sy + shelfH - 4 - bh + 4, bw - 4, 2, 'rgba(255,255,255,0.2)');
      bx += bw + 2;
    }
  }
}

function drawWhiteboard(x, y, w, h) {
  px(x - 3, y - 3, w + 6, h + 6, '#666');
  px(x, y, w, h, '#eeeee8');
  // Tray
  px(x, y + h, w, 8, '#888');
  px(x + 4, y + h - 2, 10, 4, '#e84848'); // marker
  px(x + 18, y + h - 2, 10, 4, '#2848c8'); // marker
  px(x + 32, y + h - 2, 10, 4, '#28a828'); // marker
  // Scribbles
  pxText('SPRINT', x + 8, y + 20, 9, '#c84848');
  pxText('GOALS', x + 8, y + 36, 8, '#333');
  // Lines
  for (let i = 0; i < 4; i++) {
    px(x + 8, y + 46 + i * 14, 30 + Math.random() * 40, 2, '#888');
  }
  // Checkbox
  px(x + 8, y + 100, 8, 8, '#aaa');
  px(x + 10, y + 102, 4, 4, '#28a828');
}

function drawCoffeeStation(x, y) {
  // Counter
  px(x, y, 140, 50, '#6a5a4a');
  px(x + 2, y + 2, 136, 3, '#8a7a6a');
  // Coffee machine
  px(x + 10, y - 40, 50, 42, '#333');
  px(x + 14, y - 36, 42, 34, '#444');
  px(x + 16, y - 30, 20, 20, '#555');
  px(x + 50, y - 32, 4, 4, '#e84848');
  // Mugs on counter
  px(x + 80, y + 10, 14, 14, '#fff');
  px(x + 94, y + 14, 5, 6, '#fff');
  px(x + 100, y + 10, 14, 14, '#ffeeaa');
  px(x + 114, y + 14, 5, 6, '#ffeeaa');
  // Cookies
  px(x + 70, y + 30, 24, 14, '#d4a058');
}

function drawPlant(x, y, scale) {
  const s = scale || 1;
  const pw = 20 * s, ph = 16 * s;
  // Pot
  px(x + 4*s, y + 20*s, pw, ph, '#b86838');
  px(x + 6*s, y + 20*s + ph, pw - 4*s, 4*s, '#984828');
  // Leaves
  px(x, y, pw + 8*s, 22*s, '#48a848');
  px(x + 4*s, y - 6*s, pw, 10*s, '#58b858');
  px(x - 4*s, y + 4*s, 8*s, 12*s, '#388838');
  px(x + pw + 4*s, y + 2*s, 6*s, 14*s, '#388838');
}

function drawWallArt(x, y, emoji, w, h) {
  px(x - 3, y - 3, w + 6, h + 6, '#4a4a5a');
  px(x, y, w, h, '#2a2a3a');
  ctx.font = Math.floor(h * 0.6) + 'px serif';
  ctx.fillText(emoji, x + 8, y + h - 10);
}

// ============================================================
// AGENT SPRITES (detailed pixel art)
// ============================================================
const AGENTS = [
  {
    id: 'rosie', name: 'Rosie', role: 'Boss', emoji: '🤖', model: 'claude-opus-4-6',
    color: '#FF6B9D', colorDark: '#d04a78', skin: '#f8c8a8', hair: '#8a3828', hairStyle: 'ponytail',

function drawAgentSprite(a, frame) {
  const x = Math.round(a.x);
  const y = Math.round(a.y);
  const working = a.status === 'working';
  const bobY = working ? Math.sin(frame * 0.08) * 2 : 0;
  const ay = y + bobY;

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.15)';
  ctx.beginPath();
  ctx.ellipse(x + 12, y + 48, 14, 4, 0, 0, Math.PI * 2);
  ctx.fill();

  // LEGS
  const walkCycle = Math.abs(a.x - a.tx) > 2 || Math.abs(a.y - a.ty) > 2;
  const legOff = walkCycle ? Math.sin(frame * 0.2) * 3 : 0;
  px(x + 5, ay + 36, 6, 12 + legOff, a.colorDark);
  px(x + 14, ay + 36, 6, 12 - legOff, a.colorDark);
  // Shoes
  px(x + 3, ay + 46 + legOff, 9, 4, '#2a2020');
  px(x + 13, ay + 46 - legOff, 9, 4, '#2a2020');

  // BODY
  px(x + 2, ay + 22, 20, 16, a.color);
  // Shirt detail
  px(x + 10, ay + 22, 4, 14, a.colorDark); // center line
  px(x + 2, ay + 22, 20, 2, lightenHex(a.color, 20)); // collar
  // Arms
  const armBob = working ? Math.sin(frame * 0.15) * 2 : 0;
  px(x - 2, ay + 24, 6, 12 + armBob, a.color);
  px(x + 20, ay + 24, 6, 12 - armBob, a.color);
  // Hands
  px(x - 2, ay + 34 + armBob, 5, 5, a.skin);
  px(x + 21, ay + 34 - armBob, 5, 5, a.skin);

  // HEAD
  px(x + 3, ay + 2, 18, 20, a.skin);
  // Ears
  px(x + 1, ay + 10, 4, 6, a.skin);
  px(x + 19, ay + 10, 4, 6, a.skin);

  // HAIR
  if (a.hairStyle === 'ponytail') {
    px(x + 2, ay - 2, 20, 8, a.hair);
    px(x + 2, ay + 2, 4, 8, a.hair);
    px(x + 18, ay + 2, 4, 8, a.hair);
    px(x + 20, ay + 4, 6, 14, a.hair); // ponytail
    px(x + 24, ay + 10, 4, 10, a.hair);
  } else if (a.hairStyle === 'long') {
    px(x + 1, ay - 2, 22, 8, a.hair);
    px(x - 1, ay + 2, 6, 16, a.hair);
    px(x + 19, ay + 2, 6, 16, a.hair);
  } else if (a.hairStyle === 'short') {
    px(x + 2, ay - 3, 20, 8, a.hair);
    px(x + 2, ay + 2, 3, 4, a.hair);
    px(x + 19, ay + 2, 3, 4, a.hair);
  } else if (a.hairStyle === 'spiky') {
    px(x + 2, ay - 2, 20, 6, a.hair);
    px(x + 4, ay - 6, 4, 6, a.hair);
    px(x + 10, ay - 8, 4, 8, a.hair);
    px(x + 16, ay - 5, 4, 5, a.hair);
  }

  // EYES
  const blink = frame % 150 < 4;
  if (!blink) {
    // Whites
    px(x + 6, ay + 8, 6, 6, '#fff');
    px(x + 14, ay + 8, 6, 6, '#fff');
    // Pupils
    px(x + 8, ay + 10, 3, 3, '#1a1a2e');
    px(x + 16, ay + 10, 3, 3, '#1a1a2e');
    // Shine
    px(x + 8, ay + 9, 1, 1, '#fff');
    px(x + 16, ay + 9, 1, 1, '#fff');
  } else {
    px(x + 6, ay + 11, 6, 2, '#1a1a2e');
    px(x + 14, ay + 11, 6, 2, '#1a1a2e');
  }

  // MOUTH
  if (a.speaking && frame % 20 < 10) {
    px(x + 9, ay + 16, 6, 3, '#c07070');
    px(x + 10, ay + 17, 4, 1, '#a05050');
  } else {
    px(x + 9, ay + 16, 6, 2, '#c08080');
  }

  // Cheeks (blush for female characters)
  if (a.hairStyle === 'ponytail' || a.hairStyle === 'long') {
    px(x + 4, ay + 14, 3, 2, 'rgba(255,150,150,0.3)');
    px(x + 17, ay + 14, 3, 2, 'rgba(255,150,150,0.3)');
  }

  // STATUS INDICATOR
  const sc = a.status === 'working' ? '#48e848' :
             a.status === 'thinking' ? '#e8e848' : '#666';
  px(x + 20, ay - 2, 6, 6, sc);
  if (a.status === 'working' && frame % 30 < 15) {
    px(x + 21, ay - 1, 4, 4, lightenHex(sc, 40));
  }

  // EMOJI
  ctx.font = '12px serif';
  ctx.fillText(a.emoji, x - 2, ay - 6);

  // NAME
  pxText(a.name, x + 12, ay + 58, 8, a.color, 'center');
}

function lightenHex(hex, amt) {
  let r = Math.min(255, parseInt(hex.slice(1,3),16) + amt);
  let g = Math.min(255, parseInt(hex.slice(3,5),16) + amt);
  let b = Math.min(255, parseInt(hex.slice(5,7),16) + amt);
  return `rgb(${r},${g},${b})`;
}

let convoActive = false;
let lastConvoTime = 0;
let viewerPresent = true;
let viewerTimeout = null;

document.addEventListener('mousemove', resetViewer);
document.addEventListener('click', resetViewer);
function resetViewer() {
  viewerPresent = true;
  clearTimeout(viewerTimeout);
  viewerTimeout = setTimeout(() => viewerPresent = false, 60000);
}
viewerTimeout = setTimeout(() => viewerPresent = false, 60000);

function tryConversation() {
  if (convoActive || !viewerPresent) return;
  if (Date.now() - lastConvoTime < 20000) return;

  const idle = AGENTS.filter(a => a.status === 'idle');
  if (idle.length < 2) return;

  const convo = CONVERSATIONS[Math.floor(Math.random() * CONVERSATIONS.length)];
  const needed = [...new Set(convo.map(c => c.agent))];
  if (!needed.every(id => AGENTS.find(a => a.id === id && a.status === 'idle'))) return;

  convoActive = true;
  lastConvoTime = Date.now();

  const overlay = document.getElementById('chat-overlay');
  const rect = canvas.getBoundingClientRect();
  const s = parseFloat(canvas.style.width) / CW;

  convo.forEach((line, i) => {
    setTimeout(() => {
      const agent = AGENTS.find(a => a.id === line.agent);
      if (!agent) return;
      agent.speaking = true;

      const bx = rect.left + agent.x * s;
      const by = rect.top + (agent.y - 30) * s;

      const bubble = document.createElement('div');
      bubble.className = 'chat-bubble';
      bubble.style.left = bx + 'px';
      bubble.style.top = by + 'px';
      bubble.innerHTML = `<span class="speaker" style="color:${agent.color}">${agent.name}:</span> ${line.text}`;
      overlay.appendChild(bubble);

      setTimeout(() => agent.speaking = false, 3000);
      setTimeout(() => {
        bubble.remove();
        if (i === convo.length - 1) convoActive = false;
      }, 5000);
    }, i * 3500);
  });
}

// ============================================================
// MOVEMENT
// ============================================================
function updateAgents() {
  AGENTS.forEach(a => {
    a.tx = (a.status === 'working' || a.status === 'thinking') ? a.homeX : a.loungeX;
    a.ty = (a.status === 'working' || a.status === 'thinking') ? a.homeY : a.loungeY;

    const dx = a.tx - a.x;
    const dy = a.ty - a.y;
    const dist = Math.sqrt(dx*dx + dy*dy);

    if (dist > 1) {
      const speed = Math.min(dist * 0.04, 3);
      a.x += (dx / dist) * speed;
      a.y += (dy / dist) * speed;
    } else {
      a.x = a.tx;
      a.y = a.ty;
    }
  });
}

// ============================================================
// TOOLTIP
// ============================================================
canvas.addEventListener('mousemove', (e) => {
  const rect = canvas.getBoundingClientRect();
  const s = parseFloat(canvas.style.width) / CW;
  const mx = (e.clientX - rect.left) / s;
  const my = (e.clientY - rect.top) / s;
  const tip = document.getElementById('tooltip');
  let found = false;

  AGENTS.forEach(a => {
    if (mx >= a.x - 4 && mx <= a.x + 28 && my >= a.y - 8 && my <= a.y + 56) {
      tip.style.display = 'block';
      tip.style.left = (e.clientX + 16) + 'px';
      tip.style.top = (e.clientY - 10) + 'px';
      tip.innerHTML = `
        <span class="tt-name">${a.emoji} ${a.name}</span><br>
        <span class="tt-role">${a.role} · ${a.model}</span>
        ${a.task ? `<div class="tt-task">📋 ${a.task}</div>` : '<div class="tt-task">☕ Hanging in the lounge</div>'}
      `;
      found = true;
    }
  });
  if (!found) tip.style.display = 'none';
});
canvas.addEventListener('mouseleave', () => {
  document.getElementById('tooltip').style.display = 'none';
});

// DATA FETCH
// ============================================================
async function fetchData() {
  try {
    const res = await fetch('data.json?t=' + Date.now());
    const data = await res.json();
    data.agents.forEach(d => {
      const a = AGENTS.find(ag => ag.id === d.id);
      if (a) { a.status = d.status; a.task = d.task; if (d.model) a.model = d.model; }
    });
  } catch(e) {}
}

let frame = 0;

function render() {
  frame++;
  ctx.clearRect(0, 0, CW, CH);

  drawRoom();
  updateAgents();

  // Draw agents sorted by Y
  [...AGENTS].sort((a, b) => a.y - b.y).forEach(a => drawAgentSprite(a, frame));

  // Conversation check
  if (frame % 180 === 0 && Math.random() < 0.35) tryConversation();

  requestAnimationFrame(render);
}

function updateClock() {
  const now = new Date();
  document.getElementById('clock').textContent =
    now.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' }) +
    ' · ' +
    now.toLocaleTimeString('en-US', { hour12: true, hour: '2-digit', minute: '2-digit' }) +
    ' · Mill Valley, CA';
}
