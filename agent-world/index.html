<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agent World — Rosie's Workshop</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #111;
    font-family: 'Press Start 2P', monospace;
    overflow: hidden;
    height: 100vh;
    display: flex;
    flex-direction: column;
    image-rendering: pixelated;
    -webkit-font-smoothing: none;
  }

  .canvas-wrap {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  canvas {
    display: block;
    cursor: default;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
  }

  .header {
    background: #1a1a2e;
    border-bottom: 4px solid #e94560;
    padding: 10px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    z-index: 10;
  }

  .header h1 {
    font-size: 11px;
    color: #e94560;
    text-shadow: 2px 2px 0 #0f3460;
  }

  .header .info {
    font-size: 8px;
    color: #53354a;
  }

  #tooltip {
    position: fixed;
    background: #1a1a2e;
    border: 2px solid #e94560;
    color: #fff;
    font-family: 'Press Start 2P', monospace;
    font-size: 7px;
    padding: 8px 10px;
    border-radius: 4px;
    pointer-events: none;
    z-index: 100;
    display: none;
    max-width: 220px;
    line-height: 1.6;
  }

  #tooltip .tt-name { color: #e94560; }
  #tooltip .tt-role { color: #888; }
  #tooltip .tt-task { color: #4ECDC4; margin-top: 4px; }

  /* Chat bubble overlay */
  #chat-overlay {
    position: fixed;
    pointer-events: none;
    z-index: 50;
  }

  .chat-bubble {
    position: absolute;
    background: #fff;
    color: #1a1a2e;
    font-family: 'Press Start 2P', monospace;
    font-size: 6px;
    padding: 6px 8px;
    border-radius: 6px;
    max-width: 160px;
    line-height: 1.5;
    box-shadow: 2px 2px 0 rgba(0,0,0,0.3);
    animation: bubbleIn 0.3s ease-out, bubbleOut 0.5s ease-in 4.5s forwards;
    word-wrap: break-word;
  }

  .chat-bubble::after {
    content: '';
    position: absolute;
    top: 100%;
    left: 15px;
    border: 5px solid transparent;
    border-top-color: #fff;
  }

  .chat-bubble .speaker {
    font-weight: bold;
    margin-bottom: 3px;
    display: block;
  }

  @keyframes bubbleIn {
    from { opacity: 0; transform: translateY(5px) scale(0.9); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }

  @keyframes bubbleOut {
    from { opacity: 1; }
    to { opacity: 0; }
  }
</style>
</head>
<body>

<div class="header">
  <h1>🤖 AGENT WORLD — Rosie's Workshop</h1>
  <div class="info" id="clock"></div>
</div>

<div class="canvas-wrap"><canvas id="world"></canvas></div>
<div id="tooltip"></div>
<div id="chat-overlay"></div>

<script>
// ============================================================
// CONFIG
// ============================================================
const TW = 16;
const COLS = 60;
const ROWS = 34;
const W = COLS * TW;
const H = ROWS * TW;

const canvas = document.getElementById('world');
const ctx = canvas.getContext('2d');
canvas.width = W;
canvas.height = H;

let SCALE = 2;

function resizeCanvas() {
  const header = document.querySelector('.header');
  const availW = window.innerWidth;
  const availH = window.innerHeight - header.offsetHeight;
  const scaleX = availW / W;
  const scaleY = availH / H;
  SCALE = Math.min(scaleX, scaleY);
  canvas.style.width = Math.floor(W * SCALE) + 'px';
  canvas.style.height = Math.floor(H * SCALE) + 'px';
}

resizeCanvas();
window.addEventListener('resize', resizeCanvas);

// ============================================================
// COLORS (8-bit palette)
// ============================================================
const C = {
  floorLight: '#c8b88a',
  floorDark: '#b8a87a',
  wall: '#7a6952',
  wallTop: '#8a7962',
  wallTrim: '#5a4a38',
  rug1: '#8b3a3a',
  rug2: '#a04848',
  rugBorder: '#6b2a2a',
  deskTop: '#9a7a5a',
  deskFront: '#7a5a3a',
  deskLeg: '#5a3a2a',
  chairSeat: '#4a6a8a',
  chairBack: '#3a5a7a',
  windowFrame: '#5a4a38',
  windowGlass: '#8ac8e8',
  windowGlassLight: '#aaddf8',
  sky: '#5898c8',
  bookshelf: '#6a4a2a',
  book1: '#c84848', book2: '#4888c8', book3: '#48a848', book4: '#c8a848', book5: '#a848a8',
  plant: '#48a848',
  plantDark: '#388838',
  pot: '#b86838',
  whiteboard: '#e8e8e0',
  whiteboardFrame: '#888',
  serverRack: '#3a3a4a',
  serverLight1: '#48e848',
  serverLight2: '#e84848',
  easel: '#7a5a3a',
  easelCanvas: '#f0ead8',
  coffeeTable: '#8a6a4a',
  mug: '#e8e8e8',
  couch: '#5a3a6a',
  couchLight: '#7a5a8a',
  lamp: '#c8a848',
  lampShade: '#e8d888',
  carpet: '#4a5a6a',
};

// ============================================================
// TILE MAP
// ============================================================
function drawTile(x, y, color) {
  ctx.fillStyle = color;
  ctx.fillRect(x * TW, y * TW, TW, TW);
}

function drawRect(x, y, w, h, color) {
  ctx.fillStyle = color;
  ctx.fillRect(x, y, w, h);
}

// ============================================================
// DRAW OFFICE
// ============================================================
function drawOffice() {
  // Floor
  for (let y = 4; y < ROWS; y++) {
    for (let x = 0; x < COLS; x++) {
      drawTile(x, y, (x + y) % 2 === 0 ? C.floorLight : C.floorDark);
    }
  }

  // Walls
  for (let x = 0; x < COLS; x++) {
    for (let y = 0; y < 4; y++) {
      drawTile(x, y, y < 1 ? C.wallTrim : C.wall);
    }
    // Wall trim at bottom
    drawRect(x * TW, 4 * TW - 3, TW, 3, C.wallTrim);
  }

  // ---- Windows ----
  drawWindow(6, 1);
  drawWindow(18, 1);
  drawWindow(36, 1);
  drawWindow(50, 1);

  // ---- Area Rug (lounge) ----
  drawRug(2, 22, 18, 10);

  // ---- Small rug under desks ----
  drawRug(24, 8, 14, 8, '#4a5a6a', '#3a4a5a', '#2a3a4a');

  // ---- LOUNGE AREA (left side) ----
  drawCouch(3, 23, 'right');  // couch facing right
  drawCouch(3, 28, 'right');  // second couch
  drawCoffeeTable(9, 25);
  drawLamp(2, 21);
  drawPlant(17, 22);

  // ---- DESKS (center area) ----
  // Coding desk
  drawDesk(25, 10, '💻');
  drawChair(28, 13);

  // Research desk
  drawDesk(33, 10, '🔍');
  drawChair(36, 13);

  // ---- DESIGN STATION (right area) ----
  drawEasel(46, 10);
  drawDesk(50, 12, '🎨');
  drawChair(53, 15);

  // ---- SERVER / DEPLOY AREA (far right) ----
  drawServerRack(55, 5);
  drawServerRack(57, 5);

  // ---- ROSIE'S DESK (center, prominent) ----
  drawBigDesk(28, 19);
  drawChair(31, 22);

  // ---- Bookshelf ----
  drawBookshelf(42, 1);

  // ---- Whiteboard ----
  drawWhiteboard(22, 1, 10);

  // ---- Coffee station ----
  drawCoffeeStation(15, 5);

  // ---- Plants ----
  drawPlant(0, 4);
  drawPlant(59, 4);
  drawPlant(40, 18);

  // ---- Wall art ----
  drawWallArt(10, 1, '🦞');
  drawWallArt(48, 1, '🏀');
}

function drawWindow(x, y) {
  // Frame
  drawRect(x*TW - 2, y*TW - 2, TW*4 + 4, TW*2 + 4, C.windowFrame);
  // Glass
  drawRect(x*TW, y*TW, TW*4, TW*2, C.windowGlass);
  // Panes
  drawRect(x*TW + TW*2 - 1, y*TW, 2, TW*2, C.windowFrame);
  drawRect(x*TW, y*TW + TW - 1, TW*4, 2, C.windowFrame);
  // Light reflection
  drawRect(x*TW + 3, y*TW + 3, TW - 2, TW/2, C.windowGlassLight);
  drawRect(x*TW + TW*2 + 3, y*TW + 3, TW - 2, TW/2, C.windowGlassLight);
}

function drawRug(x, y, w, h, c1, c2, border) {
  c1 = c1 || C.rug1;
  c2 = c2 || C.rug2;
  border = border || C.rugBorder;
  drawRect(x*TW, y*TW, w*TW, h*TW, border);
  drawRect(x*TW + 4, y*TW + 4, w*TW - 8, h*TW - 8, c1);
  drawRect(x*TW + 10, y*TW + 10, w*TW - 20, h*TW - 20, c2);
  // Pattern
  for (let i = 0; i < w*TW - 24; i += 12) {
    drawRect(x*TW + 12 + i, y*TW + 6, 4, 2, border);
    drawRect(x*TW + 12 + i, y*TW + h*TW - 8, 4, 2, border);
  }
}

function drawDesk(x, y, icon) {
  // Desktop
  drawRect(x*TW, y*TW, TW*4, TW*2, C.deskTop);
  drawRect(x*TW, y*TW, TW*4, 3, C.deskFront);
  // Front face
  drawRect(x*TW, y*TW + TW*2, TW*4, TW, C.deskFront);
  // Legs
  drawRect(x*TW + 2, y*TW + TW*2, 4, TW, C.deskLeg);
  drawRect(x*TW + TW*4 - 6, y*TW + TW*2, 4, TW, C.deskLeg);
  // Monitor
  drawRect(x*TW + TW + 2, y*TW - TW + 4, TW*2 - 4, TW - 2, '#2a2a3a');
  drawRect(x*TW + TW + 4, y*TW - TW + 6, TW*2 - 8, TW - 6, '#3a5a7a');
  // Monitor stand
  drawRect(x*TW + TW*2 - 3, y*TW + 2, 6, 4, '#2a2a3a');
}

function drawBigDesk(x, y) {
  // Bigger desk for Rosie
  drawRect(x*TW, y*TW, TW*6, TW*2, C.deskTop);
  drawRect(x*TW, y*TW, TW*6, 3, '#8a6a4a');
  drawRect(x*TW, y*TW + TW*2, TW*6, TW, C.deskFront);
  drawRect(x*TW + 2, y*TW + TW*2, 4, TW, C.deskLeg);
  drawRect(x*TW + TW*6 - 6, y*TW + TW*2, 4, TW, C.deskLeg);
  // Dual monitors
  drawRect(x*TW + TW, y*TW - TW + 2, TW*2 - 2, TW, '#2a2a3a');
  drawRect(x*TW + TW + 2, y*TW - TW + 4, TW*2 - 6, TW - 4, '#4a3a5a');
  drawRect(x*TW + TW*3 + 2, y*TW - TW + 2, TW*2 - 2, TW, '#2a2a3a');
  drawRect(x*TW + TW*3 + 4, y*TW - TW + 4, TW*2 - 6, TW - 4, '#4a3a5a');
  // Mug
  drawRect(x*TW + TW*5 + 2, y*TW + 4, 8, 8, C.mug);
  drawRect(x*TW + TW*5 + 10, y*TW + 6, 3, 4, C.mug);
  // Name plate
  drawRect(x*TW + TW*2, y*TW + TW*2 + 3, TW*2, 8, '#c8a848');
}

function drawChair(x, y) {
  // Seat
  drawRect(x*TW, y*TW + 4, TW*2, TW - 2, C.chairSeat);
  // Back
  drawRect(x*TW + 2, y*TW - 6, TW*2 - 4, 10, C.chairBack);
}

function drawCouch(x, y, dir) {
  const cw = TW * 6;
  const ch = TW * 3;
  // Base
  drawRect(x*TW, y*TW, cw, ch, C.couch);
  // Cushions
  drawRect(x*TW + 4, y*TW + 4, cw/2 - 6, ch - 12, C.couchLight);
  drawRect(x*TW + cw/2 + 2, y*TW + 4, cw/2 - 6, ch - 12, C.couchLight);
  // Arm rests
  drawRect(x*TW, y*TW, 6, ch, '#4a2a5a');
  drawRect(x*TW + cw - 6, y*TW, 6, ch, '#4a2a5a');
  // Back
  drawRect(x*TW, y*TW, cw, 6, '#4a2a5a');
}

function drawCoffeeTable(x, y) {
  drawRect(x*TW, y*TW, TW*3, TW*2, C.coffeeTable);
  drawRect(x*TW + 2, y*TW + 2, TW*3 - 4, TW*2 - 4, '#9a7a5a');
  // Magazine
  drawRect(x*TW + 6, y*TW + 6, 14, 10, '#e84848');
  // Mug
  drawRect(x*TW + TW*2, y*TW + 4, 8, 8, C.mug);
}

function drawLamp(x, y) {
  // Pole
  drawRect(x*TW + 6, y*TW + TW, 4, TW*2, '#888');
  // Shade
  drawRect(x*TW, y*TW, TW, TW, C.lampShade);
  drawRect(x*TW + 2, y*TW + 2, TW - 4, TW - 4, C.lamp);
}

function drawPlant(x, y) {
  // Pot
  drawRect(x*TW + 2, y*TW + TW, TW - 4, TW - 2, C.pot);
  drawRect(x*TW + 4, y*TW + TW + TW - 2, TW - 8, 3, '#8a4828');
  // Leaves
  drawRect(x*TW, y*TW - 4, TW, TW + 4, C.plant);
  drawRect(x*TW - 4, y*TW, 4, 8, C.plantDark);
  drawRect(x*TW + TW, y*TW - 2, 4, 6, C.plantDark);
  drawRect(x*TW + 2, y*TW - 6, 6, 4, C.plantDark);
}

function drawBookshelf(x, y) {
  const bw = TW * 5;
  const bh = TW * 3;
  drawRect(x*TW, y*TW, bw, bh, C.bookshelf);
  // Shelves
  drawRect(x*TW, y*TW + TW, bw, 3, '#5a3a1a');
  drawRect(x*TW, y*TW + TW*2, bw, 3, '#5a3a1a');
  // Books row 1
  const books = [C.book1, C.book2, C.book3, C.book4, C.book5, C.book1, C.book2, C.book3];
  books.forEach((c, i) => {
    const bx = x*TW + 3 + i * 9;
    drawRect(bx, y*TW + 3, 7, TW - 4, c);
  });
  // Books row 2
  books.reverse().forEach((c, i) => {
    const bx = x*TW + 3 + i * 9;
    drawRect(bx, y*TW + TW + 5, 7, TW - 6, c);
  });
}

function drawServerRack(x, y) {
  drawRect(x*TW, y*TW, TW*2, TW*4, C.serverRack);
  drawRect(x*TW + 1, y*TW + 1, TW*2 - 2, TW*4 - 2, '#2a2a3a');
  // Lights
  for (let i = 0; i < 6; i++) {
    const ly = y*TW + 6 + i * 9;
    drawRect(x*TW + 4, ly, 5, 3, Math.random() > 0.3 ? C.serverLight1 : C.serverLight2);
    drawRect(x*TW + 12, ly, 5, 3, Math.random() > 0.5 ? C.serverLight1 : '#2a2a3a');
    drawRect(x*TW + 20, ly, 5, 3, Math.random() > 0.4 ? C.serverLight1 : C.serverLight2);
  }
}

function drawEasel(x, y) {
  // Legs
  drawRect(x*TW + 2, y*TW + TW*2, 3, TW*2, C.easel);
  drawRect(x*TW + TW*2 - 5, y*TW + TW*2, 3, TW*2, C.easel);
  // Canvas
  drawRect(x*TW - 2, y*TW, TW*2 + 4, TW*2 + 4, C.easel);
  drawRect(x*TW, y*TW + 2, TW*2, TW*2, C.easelCanvas);
  // Little painting
  drawRect(x*TW + 4, y*TW + 6, 8, 8, '#88c8e8');
  drawRect(x*TW + 4, y*TW + 14, 8, 6, '#48a848');
  drawRect(x*TW + 16, y*TW + 8, 6, 10, '#e8a848');
}

function drawWhiteboard(x, y, w) {
  drawRect(x*TW, y*TW, w*TW, TW*2.5, C.whiteboardFrame);
  drawRect(x*TW + 3, y*TW + 3, w*TW - 6, TW*2.5 - 6, C.whiteboard);
  // Scribbles
  ctx.fillStyle = '#c84848';
  ctx.font = '8px "Press Start 2P"';
  ctx.fillText('TASKS', x*TW + 8, y*TW + 14);
  ctx.fillStyle = '#333';
  ctx.font = '6px "Press Start 2P"';
}

function drawCoffeeStation(x, y) {
  // Counter
  drawRect(x*TW, y*TW, TW*4, TW*2, '#6a5a4a');
  drawRect(x*TW, y*TW, TW*4, 3, '#8a7a6a');
  // Coffee machine
  drawRect(x*TW + 4, y*TW - TW + 4, TW + 4, TW, '#3a3a3a');
  drawRect(x*TW + 6, y*TW - TW + 6, TW, TW - 4, '#4a4a4a');
  // Red light
  drawRect(x*TW + TW + 4, y*TW - TW + 8, 3, 3, '#e84848');
  // Mugs
  drawRect(x*TW + TW*2 + 4, y*TW + 4, 7, 7, '#fff');
  drawRect(x*TW + TW*3, y*TW + 4, 7, 7, '#ffa');
}

function drawWallArt(x, y, emoji) {
  drawRect(x*TW, y*TW, TW*2, TW*2, '#5a4a38');
  drawRect(x*TW + 3, y*TW + 3, TW*2 - 6, TW*2 - 6, '#3a3a5a');
  ctx.font = '16px serif';
  ctx.fillText(emoji, x*TW + 5, y*TW + TW + 6);
}

// ============================================================
// AGENT SPRITES (pixel art)
// ============================================================
function drawAgent(agent, x, y, frame) {
  const px = Math.round(x);
  const py = Math.round(y);
  const c = agent.color;
  const cDark = darken(c, 30);
  const cLight = lighten(c, 30);
  const skin = agent.skin || '#f8c8a8';
  const skinDark = darken(skin, 20);
  const hair = agent.hair || '#4a3028';

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.15)';
  ctx.fillRect(px - 1, py + 18, 14, 4);

  // Body / shirt
  drawRect(px + 2, py + 10, 8, 8, c);
  drawRect(px + 1, py + 10, 2, 6, cDark); // left sleeve
  drawRect(px + 9, py + 10, 2, 6, cDark); // right sleeve

  // Pants/legs
  drawRect(px + 3, py + 18, 3, 4, cDark);
  drawRect(px + 7, py + 18, 3, 4, cDark);

  // Shoes
  drawRect(px + 2, py + 21, 4, 2, '#2a2a2a');
  drawRect(px + 7, py + 21, 4, 2, '#2a2a2a');

  // Head
  drawRect(px + 2, py, 9, 10, skin);

  // Hair
  drawRect(px + 1, py - 1, 11, 4, hair);
  if (agent.hairStyle === 'long') {
    drawRect(px, py, 2, 8, hair);
    drawRect(px + 10, py, 2, 8, hair);
  } else if (agent.hairStyle === 'ponytail') {
    drawRect(px + 1, py - 1, 11, 3, hair);
    drawRect(px + 10, py + 1, 3, 5, hair);
  } else if (agent.hairStyle === 'short') {
    drawRect(px + 1, py - 1, 11, 3, hair);
  } else if (agent.hairStyle === 'spiky') {
    drawRect(px + 1, py - 2, 2, 2, hair);
    drawRect(px + 5, py - 3, 2, 3, hair);
    drawRect(px + 9, py - 2, 2, 2, hair);
  }

  // Eyes
  const blink = frame % 120 < 3;
  if (!blink) {
    drawRect(px + 4, py + 4, 2, 2, '#1a1a2e');
    drawRect(px + 8, py + 4, 2, 2, '#1a1a2e');
    // Eye shine
    drawRect(px + 4, py + 4, 1, 1, '#fff');
    drawRect(px + 8, py + 4, 1, 1, '#fff');
  } else {
    drawRect(px + 4, py + 5, 2, 1, '#1a1a2e');
    drawRect(px + 8, py + 5, 2, 1, '#1a1a2e');
  }

  // Mouth
  if (agent.speaking) {
    drawRect(px + 5, py + 7, 3, 2, '#c87878');
  } else {
    drawRect(px + 5, py + 7, 3, 1, '#c87878');
  }

  // Arms animation when working
  if (agent.status === 'working' && frame % 30 < 15) {
    drawRect(px, py + 12, 2, 2, skin);
    drawRect(px + 10, py + 13, 2, 2, skin);
  } else {
    drawRect(px, py + 14, 2, 2, skin);
    drawRect(px + 10, py + 14, 2, 2, skin);
  }

  // Status indicator
  const statusColor = agent.status === 'working' ? '#48e848' :
                      agent.status === 'thinking' ? '#e8e848' : '#666';
  drawRect(px + 10, py - 2, 4, 4, statusColor);
  if (agent.status === 'working') {
    // Pulsing
    if (frame % 40 < 20) {
      drawRect(px + 11, py - 1, 2, 2, '#88ff88');
    }
  }

  // Emoji badge
  ctx.font = '8px serif';
  ctx.fillText(agent.emoji, px - 2, py - 4);
}

function darken(hex, amt) {
  let r = parseInt(hex.slice(1,3),16) - amt;
  let g = parseInt(hex.slice(3,5),16) - amt;
  let b = parseInt(hex.slice(5,7),16) - amt;
  r = Math.max(0, r); g = Math.max(0, g); b = Math.max(0, b);
  return `rgb(${r},${g},${b})`;
}

function lighten(hex, amt) {
  let r = parseInt(hex.slice(1,3),16) + amt;
  let g = parseInt(hex.slice(3,5),16) + amt;
  let b = parseInt(hex.slice(5,7),16) + amt;
  r = Math.min(255, r); g = Math.min(255, g); b = Math.min(255, b);
  return `rgb(${r},${g},${b})`;
}

// ============================================================
// AGENT DEFINITIONS
// ============================================================
const AGENTS = [
  {
    id: 'rosie', name: 'Rosie', role: 'Boss', emoji: '🤖',
    color: '#FF6B9D', skin: '#f8c8a8', hair: '#8a3828', hairStyle: 'ponytail',
    homePos: { x: 31*TW, y: 20*TW },  // at her desk
    loungePos: { x: 6*TW, y: 24*TW },
    status: 'idle', task: '', targetX: 0, targetY: 0, currentX: 0, currentY: 0,
    speaking: false
  },
  {
    id: 'chip', name: 'Chip', role: 'Coder', emoji: '💻',
    color: '#4ECDC4', skin: '#e8b898', hair: '#2a2a3a', hairStyle: 'short',
    homePos: { x: 28*TW, y: 11*TW },  // coding desk
    loungePos: { x: 10*TW, y: 24*TW },
    status: 'idle', task: '', targetX: 0, targetY: 0, currentX: 0, currentY: 0,
    speaking: false
  },
  {
    id: 'scout', name: 'Scout', role: 'Researcher', emoji: '🔍',

let conversationActive = false;
let lastConversationTime = 0;
let currentBubbles = [];
let viewerPresent = false;
let viewerTimer = null;

// Detect viewer
document.addEventListener('mousemove', () => {
  viewerPresent = true;
  clearTimeout(viewerTimer);
  viewerTimer = setTimeout(() => { viewerPresent = false; }, 30000);
});
document.addEventListener('click', () => {
  viewerPresent = true;
  clearTimeout(viewerTimer);
  viewerTimer = setTimeout(() => { viewerPresent = false; }, 30000);
});
// Start as "present"
viewerPresent = true;
viewerTimer = setTimeout(() => { viewerPresent = false; }, 30000);

function triggerConversation() {
  if (conversationActive) return;
  if (!viewerPresent) return;

  const now = Date.now();
  if (now - lastConversationTime < 15000) return; // min 15s between convos

  const idleAgents = AGENTS.filter(a => a.status === 'idle');
  if (idleAgents.length < 2) return;

  // Pick a random conversation
  const convo = CONVERSATIONS[Math.floor(Math.random() * CONVERSATIONS.length)];

  // Check if agents in convo are idle
  const convoAgents = [...new Set(convo.map(c => c.agent))];
  const allIdle = convoAgents.every(id => {
    const a = AGENTS.find(ag => ag.id === id);
    return a && a.status === 'idle';
  });
  if (!allIdle) return;

  conversationActive = true;
  lastConversationTime = now;

  const overlay = document.getElementById('chat-overlay');
  const canvasRect = canvas.getBoundingClientRect();

  convo.forEach((line, i) => {
    setTimeout(() => {
      const agent = AGENTS.find(a => a.id === line.agent);
      if (!agent) return;
      agent.speaking = true;

      // Position bubble above agent
      const curScale = parseFloat(canvas.style.width) / W;
      const screenX = canvasRect.left + (agent.currentX * curScale) + 6 * curScale;
      const screenY = canvasRect.top + (agent.currentY * curScale) - 20 * curScale;

      const bubble = document.createElement('div');
      bubble.className = 'chat-bubble';
      bubble.style.left = screenX + 'px';
      bubble.style.top = screenY + 'px';
      bubble.innerHTML = `<span class="speaker" style="color:${agent.color}">${agent.name}:</span>${line.text}`;
      overlay.appendChild(bubble);

      setTimeout(() => { agent.speaking = false; }, 3000);
      setTimeout(() => {
        bubble.remove();
        if (i === convo.length - 1) {
          conversationActive = false;
        }
      }, 5000);
    }, i * 3500);
  });
}

// ============================================================
// MOVEMENT
// ============================================================
function moveAgents() {
  AGENTS.forEach(agent => {
    // Set target based on status
    if (agent.status === 'working' || agent.status === 'thinking') {
      agent.targetX = agent.homePos.x;
      agent.targetY = agent.homePos.y;
    } else {
      agent.targetX = agent.loungePos.x;
      agent.targetY = agent.loungePos.y;
    }

    // Smooth movement
    const dx = agent.targetX - agent.currentX;
    const dy = agent.targetY - agent.currentY;
    const speed = 0.6; // pixels per frame

    if (Math.abs(dx) > 1) agent.currentX += dx * 0.02;
    if (Math.abs(dy) > 1) agent.currentY += dy * 0.02;

    // Snap when close
    if (Math.abs(dx) < 1 && Math.abs(dy) < 1) {
      agent.currentX = agent.targetX;
      agent.currentY = agent.targetY;
    }
  });
}

// ============================================================
// TOOLTIP
// ============================================================
canvas.addEventListener('mousemove', (e) => {
  const rect = canvas.getBoundingClientRect();
  const mx = (e.clientX - rect.left) / SCALE;
  const my = (e.clientY - rect.top) / SCALE;

  const tooltip = document.getElementById('tooltip');
  let found = false;

  AGENTS.forEach(agent => {
    const ax = agent.currentX;
    const ay = agent.currentY;
    if (mx >= ax - 4 && mx <= ax + 16 && my >= ay - 6 && my <= ay + 24) {
      tooltip.style.display = 'block';
      tooltip.style.left = (e.clientX + 12) + 'px';
      tooltip.style.top = (e.clientY - 10) + 'px';
      tooltip.innerHTML = `
        <span class="tt-name">${agent.emoji} ${agent.name}</span><br>
        <span class="tt-role">${agent.role} · ${agent.model || '?'}</span>
        ${agent.task ? `<div class="tt-task">📋 ${agent.task}</div>` : '<div class="tt-task">☕ Hanging out</div>'}
      `;
      found = true;
    }
  });

  if (!found) tooltip.style.display = 'none';
});

canvas.addEventListener('mouseleave', () => {
  document.getElementById('tooltip').style.display = 'none';
});

// DATA FETCH
// ============================================================
async function fetchData() {
  try {
    const res = await fetch('data.json?t=' + Date.now());
    const data = await res.json();
    data.agents.forEach(d => {
      const agent = AGENTS.find(a => a.id === d.id);
      if (agent) {
        agent.status = d.status;
        agent.task = d.task;
        agent.model = d.model;
      }
    });
  } catch(e) {}
}

// RENDER LOOP
// ============================================================
let frame = 0;
let serverBlinkFrame = 0;

function render() {
  frame++;
  serverBlinkFrame++;

  // Clear
  ctx.fillStyle = '#111';
  ctx.fillRect(0, 0, W, H);

  // Draw static office
  drawOffice();

  // Re-draw server lights with blink
  if (serverBlinkFrame % 60 === 0) {
    // Redraw servers for light changes
    drawServerRack(55, 5);
    drawServerRack(57, 5);
  }

  // Move agents
  moveAgents();

  // Draw agents (sorted by Y for depth)
  const sorted = [...AGENTS].sort((a, b) => a.currentY - b.currentY);
  sorted.forEach(agent => {
    drawAgent(agent, agent.currentX, agent.currentY, frame);
  });

  // Labels on areas
  ctx.fillStyle = 'rgba(255,255,255,0.15)';
  ctx.font = '6px "Press Start 2P"';
  ctx.fillText('☕ LOUNGE', 4*TW, 21.5*TW);
  ctx.fillText('💻 CODE', 26*TW, 8.5*TW);
  ctx.fillText('🔍 RESEARCH', 33*TW, 8.5*TW);
  ctx.fillText('🎨 DESIGN', 47*TW, 9*TW);
  ctx.fillText('⚡ DEPLOY', 54*TW, 4.5*TW);
  ctx.fillText('🤖 ROSIE', 29*TW, 18*TW);

  // Trigger conversations
  if (frame % 120 === 0) {
    if (Math.random() < 0.3) {
      triggerConversation();
    }
  }

  requestAnimationFrame(render);
}
