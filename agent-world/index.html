<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agent World — Rosie's Workshop</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a1a;
    font-family: 'Press Start 2P', monospace;
    overflow: hidden;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }
  .header {
    background: linear-gradient(180deg, #1e1e3a, #14142a);
    border-bottom: 3px solid #e94560;
    padding: 8px 16px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    z-index: 10;
    flex-shrink: 0;
  }
  .header h1 { font-size: 13px; color: #e94560; text-shadow: 1px 1px 0 #0f3460; }
  .header .info { font-size: 10px; color: #7a6a8a; }
  .canvas-wrap {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    background: #0a0a1a;
  }
  canvas { display: block; }
  #tooltip {
    position: fixed;
    background: rgba(20,20,40,0.95);
    border: 2px solid #e94560;
    color: #fff;
    font-family: 'Press Start 2P', monospace;
    font-size: 10px;
    padding: 10px 14px;
    border-radius: 6px;
    pointer-events: none;
    z-index: 100;
    display: none;
    max-width: 280px;
    line-height: 1.8;
    box-shadow: 0 4px 20px rgba(0,0,0,0.5);
  }
  #tooltip .tt-name { color: #e94560; font-size: 11px; }
  #tooltip .tt-role { color: #8888aa; font-size: 9px; }
  #tooltip .tt-task { color: #4ECDC4; margin-top: 6px; font-size: 9px; }
  .chat-bubble {
    position: absolute;
    background: rgba(255,255,255,0.96);
    color: #1a1a2e;
    font-family: 'Inter', 'Press Start 2P', sans-serif;
    font-size: 12px;
    padding: 10px 14px;
    border-radius: 12px 12px 12px 4px;
    max-width: 230px;
    line-height: 1.5;
    box-shadow: 0 4px 16px rgba(0,0,0,0.3);
    animation: bubbleIn 0.3s ease-out, bubbleOut 0.4s ease-in 4.6s forwards;
    word-wrap: break-word;
    pointer-events: none;
  }
  .chat-bubble .speaker { font-weight: 700; margin-bottom: 3px; display: block; font-size: 11px; }
  @keyframes bubbleIn {
    from { opacity: 0; transform: translateY(5px) scale(0.9); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }
  @keyframes bubbleOut { from { opacity: 1; } to { opacity: 0; } }
</style>
</head>
<body>
<div class="header">
  <h1>🤖 AGENT WORLD — Rosie's Workshop</h1>
  <div class="info" id="clock"></div>
</div>
<div class="canvas-wrap"><canvas id="world"></canvas></div>
<div id="tooltip"></div>
<div id="chat-overlay" style="position:fixed;pointer-events:none;z-index:50;"></div>

<script>
const canvas = document.getElementById('world');
const ctx = canvas.getContext('2d');
const CW = 1280, CH = 720;
canvas.width = CW; canvas.height = CH;

function resizeCanvas() {
  const hdr = document.querySelector('.header');
  const s = Math.min(window.innerWidth / CW, (window.innerHeight - hdr.offsetHeight) / CH);
  canvas.style.width = Math.floor(CW * s) + 'px';
  canvas.style.height = Math.floor(CH * s) + 'px';
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

// ============================================================
// DRAW HELPERS
// ============================================================
function px(x,y,w,h,c) { ctx.fillStyle=c; ctx.fillRect(Math.round(x),Math.round(y),w,h); }
function pxGrad(x,y,w,h,c1,c2,v) {
  const g=v?ctx.createLinearGradient(x,y,x,y+h):ctx.createLinearGradient(x,y,x+w,y);
  g.addColorStop(0,c1);g.addColorStop(1,c2);ctx.fillStyle=g;ctx.fillRect(Math.round(x),Math.round(y),w,h);
}
function pxText(t,x,y,s,c,a) { ctx.fillStyle=c;ctx.font=s+'px "Press Start 2P"';ctx.textAlign=a||'left';ctx.fillText(t,x,y);ctx.textAlign='left'; }
function lightenHex(hex,amt) {
  let r=Math.min(255,parseInt(hex.slice(1,3),16)+amt);
  let g=Math.min(255,parseInt(hex.slice(3,5),16)+amt);
  let b=Math.min(255,parseInt(hex.slice(5,7),16)+amt);
  return `rgb(${r},${g},${b})`;
}
function ellipse(x,y,rx,ry,c) {
  ctx.fillStyle=c;ctx.beginPath();ctx.ellipse(x,y,rx,ry,0,0,Math.PI*2);ctx.fill();
}

// ============================================================
// PRE-COMPUTED RANDOM DATA (no flicker!)
// ============================================================
const BOOK_COLORS = ['#c84848','#4888c8','#48a848','#c8a848','#a848a8','#c87848','#4ac8a8','#c848a8','#e88848','#5858c8'];
const BOOK_SHELVES = [];
for (let s = 0; s < 4; s++) {
  const shelf = [];
  let bx = 0;
  for (let j = 0; j < 9; j++) {
    const bw = 8 + Math.floor(Math.random() * 8);
    const bh = 28 + Math.floor(Math.random() * 6);
    shelf.push({ w: bw, h: bh, color: BOOK_COLORS[(s*3+j) % BOOK_COLORS.length], x: bx });
    bx += bw + 2;
  }
  BOOK_SHELVES.push(shelf);
}

const SERVER_LIGHTS = [];
for (let rack = 0; rack < 3; rack++) {
  const rackLights = [];
  for (let unit = 0; unit < 5; unit++) {
    const lights = [];
    for (let j = 0; j < 4; j++) {
      lights.push({ on: Math.random() > 0.25, red: Math.random() > 0.75, bar: 6 + Math.floor(Math.random() * 20) });
    }
    rackLights.push(lights);
  }
  SERVER_LIGHTS.push(rackLights);
}

const WB_LINES = [];
for (let i = 0; i < 4; i++) WB_LINES.push(30 + Math.floor(Math.random() * 40));

const FLOOR_GRAIN = [];
for (let y = 0; y < 20; y++) {
  for (let x = 0; x < 42; x++) {
    FLOOR_GRAIN.push({ ox: 2+Math.floor(Math.random()*8), oy: 6+Math.floor(Math.random()*12), w: 14+Math.floor(Math.random()*12) });
  }
}

// ============================================================
// STATIC ROOM (rendered once to offscreen canvas)
// ============================================================
const roomCanvas = document.createElement('canvas');
roomCanvas.width = CW; roomCanvas.height = CH;
const rctx = roomCanvas.getContext('2d');

function drawRoomStatic() {
  const _ctx = ctx;
  // temporarily redirect px/pxGrad/pxText to rctx
  const origFill = ctx.fillRect.bind(ctx);

  // We'll just draw directly to rctx
  const oc = ctx;

  // Swap context
  Object.defineProperty(window, '_rc', { value: rctx, writable: true });

  // FLOOR
  let gi = 0;
  for (let fy = 180; fy < CH; fy += 32) {
    for (let fx = 0; fx < CW; fx += 32) {
      const checker = ((fx/32|0) + (fy/32|0)) % 2;
      rctx.fillStyle = checker ? '#c4a882' : '#b89872';
      rctx.fillRect(fx, fy, 32, 32);
      const g = FLOOR_GRAIN[gi % FLOOR_GRAIN.length]; gi++;
      rctx.fillStyle = checker ? '#ae8e6a' : '#c0a07a';
      rctx.fillRect(fx + g.ox, fy + 8, g.w, 1);
      rctx.fillRect(fx + g.ox + 2, fy + 22, g.w - 4, 1);
    }
  }

  // Floor shadow along wall
  const wallShadow = rctx.createLinearGradient(0, 180, 0, 210);
  wallShadow.addColorStop(0, 'rgba(0,0,0,0.12)');
  wallShadow.addColorStop(1, 'rgba(0,0,0,0)');
  rctx.fillStyle = wallShadow;
  rctx.fillRect(0, 180, CW, 30);

  // WALLS
  const wg = rctx.createLinearGradient(0, 0, 0, 180);
  wg.addColorStop(0, '#7a9aba'); wg.addColorStop(0.7, '#6a8aaa'); wg.addColorStop(1, '#5a7a9a');
  rctx.fillStyle = wg; rctx.fillRect(0, 0, CW, 180);

  // Wainscoting
  rctx.fillStyle = '#5a7a9a'; rctx.fillRect(0, 140, CW, 40);
  rctx.fillStyle = '#4a6a8a'; rctx.fillRect(0, 140, CW, 3);
  rctx.fillStyle = '#3a5a7a'; rctx.fillRect(0, 177, CW, 3);
  for (let x = 0; x < CW; x += 80) {
    rctx.fillStyle = '#506e8e'; rctx.fillRect(x+4, 145, 72, 30);
    rctx.fillStyle = '#5a7a9a'; rctx.fillRect(x+6, 147, 68, 26);
  }

  // Helper to draw to rctx
  function r(x,y,w,h,c) { rctx.fillStyle=c; rctx.fillRect(Math.round(x),Math.round(y),w,h); }
  function rr(x,y,w,h,rad,c) { rctx.fillStyle=c; rctx.beginPath(); rctx.roundRect(Math.round(x),Math.round(y),w,h,rad); rctx.fill(); }
  function rGrad(x,y,w,h,c1,c2,v) {
    const g=v?rctx.createLinearGradient(x,y,x,y+h):rctx.createLinearGradient(x,y,x+w,y);
    g.addColorStop(0,c1);g.addColorStop(1,c2);rctx.fillStyle=g;rctx.fillRect(Math.round(x),Math.round(y),w,h);
  }
  function rrGrad(x,y,w,h,rad,c1,c2,v) {
    const g=v?rctx.createLinearGradient(x,y,x,y+h):rctx.createLinearGradient(x,y,x+w,y);
    g.addColorStop(0,c1);g.addColorStop(1,c2);rctx.fillStyle=g;rctx.beginPath();rctx.roundRect(Math.round(x),Math.round(y),w,h,rad);rctx.fill();
  }

  // WINDOWS (rounded, smooth)
  function drawWin(x, y, w, h) {
    rr(x-5,y-5,w+10,h+10,6,'#3a4a5a');
    rr(x-3,y-3,w+6,h+6,5,'#4a5a6a');
    rrGrad(x,y,w,h,4,'#88c8e8','#aaddff',true);
    // Clouds
    rctx.fillStyle='rgba(255,255,255,0.5)';
    rctx.beginPath();rctx.ellipse(x+40,y+25,24,8,0,0,Math.PI*2);rctx.fill();
    rctx.fillStyle='rgba(255,255,255,0.35)';
    rctx.beginPath();rctx.ellipse(x+w-40,y+45,18,7,0,0,Math.PI*2);rctx.fill();
    // Panes
    rr(x+w/2-2,y,4,h,2,'#4a5a6a');
    rr(x,y+h/2-2,w,4,2,'#4a5a6a');
    // Reflections
    rr(x+6,y+6,28,14,4,'rgba(255,255,255,0.15)');
    rr(x+w/2+8,y+6,22,10,3,'rgba(255,255,255,0.1)');
    // Sill
    rr(x-8,y+h,w+16,10,3,'#4a5a6a');
    rr(x-6,y+h,w+12,5,2,'#5a6a7a');
    // Curtains
    rGrad(x-16,y-5,18,h+15,'rgba(140,100,80,0.35)','rgba(140,100,80,0.15)',false);
    rGrad(x+w-2,y-5,18,h+15,'rgba(140,100,80,0.15)','rgba(140,100,80,0.35)',false);
    for (let i = 0; i < 3; i++) {
      r(x-14+i*4, y+10+i*8, 2, h-20, 'rgba(120,80,60,0.12)');
      r(x+w+2+i*4, y+10+i*8, 2, h-20, 'rgba(120,80,60,0.12)');
    }
  }
  drawWin(80,20,160,120);
  drawWin(360,20,160,120);
  drawWin(760,20,160,120);
  drawWin(1040,20,160,120);

  // AREA RUG (lounge, rounded)
  rr(40,430,360,250,12,'#5a2020');
  rr(46,436,348,238,10,'#7a2e2e');
  rr(54,444,332,222,8,'#943838');
  // Center medallion
  rctx.fillStyle = 'rgba(120,50,50,0.3)';
  rctx.beginPath(); rctx.ellipse(220, 555, 60, 40, 0, 0, Math.PI*2); rctx.fill();
  rctx.fillStyle = 'rgba(150,60,60,0.2)';
  rctx.beginPath(); rctx.ellipse(220, 555, 35, 24, 0, 0, Math.PI*2); rctx.fill();

  // DESK RUG
  rr(440,240,350,210,10,'#3a4a5a');
  rr(444,244,342,202,8,'#445566');
  rr(448,248,334,194,6,'#4a5e72');

  // CEILING LIGHTS
  for (let lx of [200, 520, 840, 1120]) {
    r(lx,0,4,14,'#888');
    r(lx-18,14,40,7,'#e8d888');
    r(lx-14,21,32,4,'#c8b868');
    r(lx-12,25,28,2,'#a89848');
    rctx.fillStyle='rgba(255,240,180,0.035)';
    rctx.beginPath();rctx.moveTo(lx-18,25);rctx.lineTo(lx+22,25);rctx.lineTo(lx+90,180);rctx.lineTo(lx-86,180);rctx.fill();
  }

  // ==================== LOUNGE ====================
  // Couch helper
  function drawCouch(x,y,w,h) {
    rr(x+4,y+h-2,w-4,8,4,'rgba(0,0,0,0.08)');
    rr(x,y,w,h,8,'#5a3a6a');
    rr(x,y,w,20,8,'#4a2a5a');
    rr(x,y,22,h,[8,0,0,8],'#4a2a5a');
    rr(x+w-22,y,22,h,[0,8,8,0],'#4a2a5a');
    const cw=(w-48)/3;
    for(let i=0;i<3;i++){
      const cx=x+24+i*(cw+2);
      rr(cx,y+22,cw-2,h-26,6,'#7a5a8a');
      rr(cx+3,y+24,cw-8,h-32,4,'#8a6a9a');
      rr(cx+4,y+26,cw-10,6,3,'#9a7aaa');
    }
    rr(x+24,y+18,24,24,6,'#c888a8');
    rr(x+w-50,y+18,24,24,6,'#88a8c8');
  }
  drawCouch(60,460,280,80);
  drawCouch(60,600,280,80);

  // Coffee table
  rr(164,559,108,42,6,'rgba(0,0,0,0.06)');
  rr(160,555,108,40,6,'#8a6a4a');
  rr(162,557,104,36,5,'#9a7a5a');
  rr(162,557,104,4,2,'#aa8a68');
  // Table items
  r(172,565,26,18,'#e84848'); r(174,567,22,2,'#fff'); // magazine
  r(224,563,16,16,'#eee'); r(240,567,5,8,'#eee'); // mug
  rctx.fillStyle='rgba(200,180,160,0.3)';
  rctx.beginPath();rctx.ellipse(232,558,8,4,0,0,Math.PI*2);rctx.fill(); // steam
  r(250,568,18,14,'#4888c8'); r(252,570,14,2,'#6aa8e8'); // phone
  r(200,570,14,10,'#48a848'); // coaster

  // Floor lamps
  function drawLamp(x,y) {
    r(x+10,y+26,4,52,'#777');
    r(x+6,y+76,12,5,'#555');
    r(x-2,y,28,26,'#e8d080');
    r(x,y+2,24,22,'#f0e0a0');
    r(x+8,y+8,8,8,'#fff8d0');
    rctx.fillStyle='rgba(255,240,180,0.05)';
    rctx.beginPath();rctx.arc(x+12,y+13,55,0,Math.PI*2);rctx.fill();
  }
  drawLamp(42,418);
  drawLamp(352,418);

  // ==================== CODE DESK ====================
  function drawDesk(x,y,w) {
    w=w||136;
    rr(x+4,y+70,w-4,6,3,'rgba(0,0,0,0.06)');
    rr(x,y+20,w,30,4,'#a0764e');
    rr(x+2,y+22,w-4,26,3,'#b08858');
    r(x+2,y+22,w-4,3,'#c0986a');
    rr(x+4,y+50,w-8,22,3,'#8a6640');
    rr(x+20,y+52,w-40,18,[0,0,4,4],'#6e5030');
    rr(x+6,y+50,8,24,[0,0,3,3],'#6e5030');
    rr(x+w-14,y+50,8,24,[0,0,3,3],'#6e5030');
  }

  // CODE DESK
  drawDesk(460,260);
  // Monitor
  rr(490,250,80,32,4,'#1a1a2a'); rr(494,253,72,26,3,'#1e3a5a');
  rr(524,282,12,6,2,'#2a2a2a'); rr(516,286,28,4,2,'#222');
  // Code on screen
  r(498,257,20,3,'#68c898'); r(498,262,36,3,'rgba(100,200,150,0.4)');
  r(498,267,28,3,'rgba(160,120,240,0.4)'); r(498,272,40,3,'rgba(100,200,150,0.3)');
  // Keyboard
  rr(492,294,52,13,3,'#2a2a2a'); rr(494,296,48,9,2,'#3a3a3a');
  for(let i=0;i<6;i++) rr(496+i*7,297,5,3,1,'#4a4a4a');
  for(let i=0;i<5;i++) rr(499+i*7,302,5,2,1,'#4a4a4a');
  // Mouse
  rr(550,296,10,14,4,'#333'); rr(552,298,6,4,2,'#444');
  // CODE ACCESSORIES: energy drink, sticky notes, rubber duck
  r(464,270,10,16,'#48c848'); r(465,268,8,4,'#388838'); // energy drink
  r(464,286,2,1,'rgba(72,200,72,0.3)'); // can reflection
  r(578,274,22,22,'#FFE66D'); // sticky note
  pxText('TODO',580,284,5,'#8a6a2a'); pxText('fix',580,292,5,'#8a6a2a');
  // Rubber duck
  r(570,294,10,8,'#FFD700'); r(572,290,6,6,'#FFD700'); r(571,292,2,2,'#111'); r(577,293,3,2,'#F97316');
  // Headphones on desk
  r(462,296,18,4,'#333'); r(460,292,6,8,'#444'); r(476,292,6,8,'#444');

  // RESEARCH DESK
  drawDesk(610,260);
  // Monitor
  rr(640,250,80,32,4,'#1a1a2a'); rr(644,253,72,26,3,'#1e2a4a');
  rr(674,282,12,6,2,'#2a2a2a'); rr(666,286,28,4,2,'#222');
  // Research on screen - search results
  r(648,257,40,3,'#e8e848'); r(648,262,60,3,'rgba(200,200,100,0.4)');
  r(648,267,50,3,'rgba(200,200,100,0.3)'); r(648,272,44,3,'rgba(200,200,100,0.3)');
  // Keyboard + mouse
  rr(642,294,52,13,3,'#2a2a2a'); rr(644,296,48,9,2,'#3a3a3a');
  rr(700,296,10,14,4,'#333');
  // RESEARCH ACCESSORIES: magnifying glass, notebooks, globe
  r(614,274,20,26,'#4888c8'); r(616,276,16,22,'#5898d8'); // notebook
  r(617,278,14,2,'#fff'); r(617,283,10,2,'#fff'); r(617,288,12,2,'#fff');
  r(636,280,16,20,'#c84848'); r(638,282,12,16,'#d85858'); // red notebook
  r(639,284,10,2,'#fff');
  // Globe
  rctx.fillStyle='#4888c8';rctx.beginPath();rctx.arc(735,280,10,0,Math.PI*2);rctx.fill();
  rctx.fillStyle='#48a848';rctx.beginPath();rctx.arc(733,278,5,0,Math.PI*1.2);rctx.fill();
  rctx.fillStyle='#48a848';rctx.beginPath();rctx.arc(738,284,4,0.5,Math.PI*1.5);rctx.fill();
  r(733,290,4,8,'#666'); r(728,296,14,3,'#555'); // globe stand
  // Cup of tea
  r(724,268,12,12,'#ddd'); r(736,272,4,6,'#ddd'); // tea mug
  r(726,264,8,5,'rgba(180,220,180,0.3)'); // steam

  // DESIGN DESK
  drawDesk(880,300,140);
  // Monitor
  rr(910,290,80,32,4,'#1a1a2a'); rr(914,293,72,26,3,'#2a1a3a');
  rr(944,322,12,6,2,'#2a2a2a'); rr(936,326,28,4,2,'#222');
  // Design on screen - color palette
  const palColors = ['#FF6B9D','#4ECDC4','#FFE66D','#A78BFA','#F97316'];
  palColors.forEach((c,i) => r(918+i*12,297,10,8,c));
  r(918,308,50,3,'rgba(160,140,200,0.4)'); r(918,314,36,3,'rgba(160,140,200,0.3)');
  // Drawing tablet
  r(896,334,40,28,'#2a2a2a'); r(898,336,36,24,'#3a3a4a');
  r(900,338,32,20,'#4a4a5a'); // screen area
  r(940,340,16,4,'#555'); // pen
  // DESIGN ACCESSORIES: paint palette, color swatches, plant
  r(1000,310,30,22,'#d8c8a8'); // palette
  rctx.fillStyle='#d8c8a8';rctx.beginPath();rctx.arc(1015,320,12,0,Math.PI*2);rctx.fill();
  ['#e84848','#4888c8','#48a848','#e8c848','#a848a8'].forEach((c,i) => {
    rctx.fillStyle=c;rctx.beginPath();rctx.arc(1004+i*5,315+((i%2)*6),3,0,Math.PI*2);rctx.fill();
  });
  // Pantone swatches
  r(884,310,12,20,'#e84848'); r(884,310,12,3,'#fff');
  r(884,332,12,20,'#4888c8'); r(884,332,12,3,'#fff');

  // EASEL
  r(836,316,6,60,'#8a6640'); r(878,316,6,60,'#8a6640');
  r(836,346,48,4,'#6e5030');
  r(828,232,64,86,'#8a6640');
  r(832,235,56,80,'#f5f0e0');
  rGrad(836,240,48,32,'#88c8e8','#5898c8',true);
  r(836,272,48,22,'#48a848'); r(836,272,16,22,'#58b858');
  r(836,294,48,16,'#c8a040');
  r(852,256,18,26,'#8a6a4a'); r(842,244,38,22,'#388838');

function drawAgentSprite(a, frame) {
  const cx = Math.round(a.x) + 13; // center x
  const y = Math.round(a.y);
  const working = a.status === 'working';
  const bob = working ? Math.sin(frame * 0.08) * 1.5 : 0;
  const ay = y + bob;
  const walking = Math.abs(a.x - a.tx) > 2 || Math.abs(a.y - a.ty) > 2;
  const legAnim = walking ? Math.sin(frame * 0.2) * 4 : 0;
  const armAnim = working ? Math.sin(frame * 0.15) * 3 : 0;

  // Shadow (soft ellipse)
  ctx.fillStyle = 'rgba(0,0,0,0.18)';
  ctx.beginPath(); ctx.ellipse(cx, y + 52, 18, 6, 0, 0, Math.PI * 2); ctx.fill();

  // === LEGS ===
  ctx.fillStyle = a.colorDark;
  roundRect(cx - 8, ay + 40 + legAnim, 7, 14, 2);
  roundRect(cx + 1, ay + 40 - legAnim, 7, 14, 2);
  // Shoes
  ctx.fillStyle = '#2a2222';
  roundRect(cx - 9, ay + 52 + legAnim, 9, 4, 2);
  roundRect(cx + 0, ay + 52 - legAnim, 9, 4, 2);
  // Shoe highlights
  ctx.fillStyle = '#3a3232';
  ctx.fillRect(cx - 8, ay + 52 + legAnim, 7, 1);
  ctx.fillRect(cx + 1, ay + 52 - legAnim, 7, 1);

  // === BODY ===
  ctx.fillStyle = a.color;
  roundRect(cx - 11, ay + 22, 22, 20, 3);
  // Shirt shading (left side darker)
  ctx.fillStyle = a.colorDark;
  roundRect(cx - 11, ay + 22, 6, 20, 3);
  // Collar
  ctx.fillStyle = lightenHex(a.color, 30);
  roundRect(cx - 9, ay + 22, 18, 4, 2);
  // Center line
  ctx.fillStyle = a.colorDark;
  ctx.fillRect(cx - 1, ay + 26, 2, 14);
  // Belt
  ctx.fillStyle = '#333';
  ctx.fillRect(cx - 9, ay + 40, 18, 3);
  ctx.fillStyle = '#999';
  roundRect(cx - 2, ay + 39, 4, 5, 1); // buckle

  // === ARMS ===
  ctx.fillStyle = a.color;
  roundRect(cx - 15, ay + 24 + armAnim, 6, 16, 3);
  roundRect(cx + 9, ay + 24 - armAnim, 6, 16, 3);
  // Arm shading
  ctx.fillStyle = a.colorDark;
  roundRect(cx - 15, ay + 24 + armAnim, 3, 16, 2);
  // Hands
  ctx.fillStyle = a.skin;
  ctx.beginPath(); ctx.arc(cx - 12, ay + 40 + armAnim, 4, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(cx + 12, ay + 40 - armAnim, 4, 0, Math.PI * 2); ctx.fill();

  // === HEAD ===
  // Neck
  ctx.fillStyle = a.skin;
  ctx.fillRect(cx - 3, ay + 18, 6, 6);
  // Head shape (rounded)
  ctx.fillStyle = a.skin;
  roundRect(cx - 11, ay - 2, 22, 22, 6);
  // Face shadow (subtle)
  ctx.fillStyle = lightenHex(a.skin, -10);
  roundRect(cx - 11, ay + 12, 22, 8, 4);
  // Ears
  ctx.fillStyle = a.skin;
  ctx.beginPath(); ctx.ellipse(cx - 12, ay + 8, 3, 5, 0, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(cx + 12, ay + 8, 3, 5, 0, 0, Math.PI * 2); ctx.fill();
  // Inner ear
  ctx.fillStyle = lightenHex(a.skin, -15);
  ctx.beginPath(); ctx.ellipse(cx - 12, ay + 9, 2, 3, 0, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(cx + 12, ay + 9, 2, 3, 0, 0, Math.PI * 2); ctx.fill();

  // === HAIR ===
  ctx.fillStyle = a.hair;
  if (a.hairStyle === 'ponytail') {
    roundRect(cx - 12, ay - 6, 24, 12, 5);
    ctx.fillRect(cx - 12, ay, 5, 10);
    ctx.fillRect(cx + 8, ay, 5, 10);
    // Ponytail
    roundRect(cx + 12, ay + 2, 8, 18, 4);
    roundRect(cx + 16, ay + 12, 5, 12, 3);
    // Bangs
    ctx.fillStyle = lightenHex(a.hair, 20);
    roundRect(cx - 8, ay - 4, 16, 4, 2);
    // Shine
    ctx.fillStyle = lightenHex(a.hair, 35);
    ctx.fillRect(cx - 4, ay - 5, 8, 2);
  } else if (a.hairStyle === 'long') {
    roundRect(cx - 13, ay - 6, 26, 12, 5);
    roundRect(cx - 14, ay, 7, 22, 3);
    roundRect(cx + 8, ay, 7, 22, 3);
    // Front detail
    ctx.fillStyle = lightenHex(a.hair, 15);
    roundRect(cx - 8, ay - 4, 16, 5, 2);
    ctx.fillStyle = lightenHex(a.hair, 30);
    ctx.fillRect(cx - 3, ay - 5, 6, 2);
  } else if (a.hairStyle === 'short') {
    roundRect(cx - 12, ay - 7, 24, 13, 5);
    ctx.fillRect(cx - 12, ay, 4, 6);
    ctx.fillRect(cx + 9, ay, 4, 6);
    // Texture
    ctx.fillStyle = lightenHex(a.hair, 18);
    roundRect(cx - 6, ay - 6, 12, 4, 2);
    ctx.fillStyle = lightenHex(a.hair, 30);
    ctx.fillRect(cx - 2, ay - 6, 5, 2);
  } else if (a.hairStyle === 'spiky') {
    roundRect(cx - 12, ay - 5, 24, 10, 4);
    // Spikes (triangles)
    ctx.beginPath(); ctx.moveTo(cx-7,ay-5); ctx.lineTo(cx-4,ay-14); ctx.lineTo(cx-1,ay-5); ctx.fill();
    ctx.beginPath(); ctx.moveTo(cx-1,ay-5); ctx.lineTo(cx+2,ay-16); ctx.lineTo(cx+5,ay-5); ctx.fill();
    ctx.beginPath(); ctx.moveTo(cx+5,ay-5); ctx.lineTo(cx+8,ay-12); ctx.lineTo(cx+11,ay-5); ctx.fill();
    // Highlights on spikes
    ctx.fillStyle = lightenHex(a.hair, 30);
    ctx.beginPath(); ctx.moveTo(cx-5,ay-5); ctx.lineTo(cx-4,ay-11); ctx.lineTo(cx-3,ay-5); ctx.fill();
    ctx.beginPath(); ctx.moveTo(cx+1,ay-5); ctx.lineTo(cx+2,ay-13); ctx.lineTo(cx+3,ay-5); ctx.fill();
  }

  // === EYES ===
  const blink = frame % 180 < 4;
  if (!blink) {
    // Eye whites (rounded)
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.ellipse(cx - 5, ay + 7, 5, 4.5, 0, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(cx + 5, ay + 7, 5, 4.5, 0, 0, Math.PI * 2); ctx.fill();
    // Irises
    ctx.fillStyle = a.eyeColor || '#3a4a6a';
    ctx.beginPath(); ctx.arc(cx - 4, ay + 8, 3, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(cx + 6, ay + 8, 3, 0, Math.PI * 2); ctx.fill();
    // Pupils
    ctx.fillStyle = '#111';
    ctx.beginPath(); ctx.arc(cx - 4, ay + 8, 1.8, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(cx + 6, ay + 8, 1.8, 0, Math.PI * 2); ctx.fill();
    // Catch lights
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(cx - 5, ay + 7, 1.2, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(cx + 5, ay + 7, 1.2, 0, Math.PI * 2); ctx.fill();
    // Eyebrows
    ctx.fillStyle = a.hair;
    ctx.lineWidth = 2;
    ctx.strokeStyle = a.hair;
    ctx.beginPath(); ctx.moveTo(cx-8,ay+1); ctx.quadraticCurveTo(cx-5,ay-1,cx-1,ay+2); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(cx+2,ay+2); ctx.quadraticCurveTo(cx+5,ay-1,cx+9,ay+1); ctx.stroke();
  } else {
    // Blink - curved lines
    ctx.strokeStyle = '#1a1a2e';
    ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(cx-8,ay+8); ctx.quadraticCurveTo(cx-5,ay+10,cx-1,ay+8); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(cx+2,ay+8); ctx.quadraticCurveTo(cx+5,ay+10,cx+9,ay+8); ctx.stroke();
  }

  // === NOSE ===
  ctx.fillStyle = lightenHex(a.skin, -12);
  ctx.beginPath(); ctx.ellipse(cx, ay + 12, 2, 2.5, 0, 0, Math.PI * 2); ctx.fill();

  // === MOUTH ===
  if (a.speaking && frame % 20 < 10) {
    ctx.fillStyle = '#c07070';
    ctx.beginPath(); ctx.ellipse(cx, ay + 16, 4, 3, 0, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#a05050';
    ctx.beginPath(); ctx.ellipse(cx, ay + 17, 3, 1.5, 0, 0, Math.PI * 2); ctx.fill();
  } else {
    ctx.strokeStyle = '#c08080';
    ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.moveTo(cx-3,ay+16); ctx.quadraticCurveTo(cx,ay+18,cx+3,ay+16); ctx.stroke();
  }

  // === CHEEKS (women) ===
  if (a.hairStyle === 'ponytail' || a.hairStyle === 'long') {
    ctx.fillStyle = 'rgba(255,130,130,0.2)';
    ctx.beginPath(); ctx.ellipse(cx - 7, ay + 13, 4, 2.5, 0, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(cx + 7, ay + 13, 4, 2.5, 0, 0, Math.PI * 2); ctx.fill();
  }

  // === EMOJI ===
  ctx.font = '14px serif';
  ctx.fillText(a.emoji, cx - 8, ay - 12);

  // === NAME PILL ===
  ctx.font = 'bold 9px "Press Start 2P"';
  const nameW = ctx.measureText(a.name).width;
  const pillW = nameW + 16;
  const pillH = 18;
  const pillX = cx - pillW / 2;
  const pillY = ay + 58;
  // Pill background
  ctx.fillStyle = a.color;
  ctx.beginPath();
  ctx.roundRect(pillX, pillY, pillW, pillH, pillH / 2);
  ctx.fill();
  // Pill shadow
  ctx.fillStyle = 'rgba(0,0,0,0.15)';
  ctx.beginPath();
  ctx.roundRect(pillX + 1, pillY + 1, pillW, pillH, pillH / 2);
  ctx.fill();
  // Redraw pill on top of shadow
  ctx.fillStyle = a.color;
  ctx.beginPath();
  ctx.roundRect(pillX, pillY, pillW, pillH, pillH / 2);
  ctx.fill();
  // Name text (white)
  ctx.fillStyle = '#fff';
  ctx.textAlign = 'center';
  ctx.fillText(a.name, cx, pillY + 13);
  ctx.textAlign = 'left';

// Rounded rect helper
function roundRect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
  ctx.fill();
}

let convoActive=false,lastConvoTime=0,viewerPresent=true,viewerTimeout=null;
document.addEventListener('mousemove',rv);document.addEventListener('click',rv);
function rv(){viewerPresent=true;clearTimeout(viewerTimeout);viewerTimeout=setTimeout(()=>viewerPresent=false,60000);}
viewerTimeout=setTimeout(()=>viewerPresent=false,60000);

function tryConversation(){
  if(convoActive||!viewerPresent)return;
  if(Date.now()-lastConvoTime<20000)return;
  const idle=AGENTS.filter(a=>a.status==='idle');
  if(idle.length<2)return;
  const convo=CONVERSATIONS[Math.floor(Math.random()*CONVERSATIONS.length)];
  const needed=[...new Set(convo.map(c=>c.agent))];
  if(!needed.every(id=>AGENTS.find(a=>a.id===id&&a.status==='idle')))return;
  convoActive=true;lastConvoTime=Date.now();
  const overlay=document.getElementById('chat-overlay');
  const rect=canvas.getBoundingClientRect();
  const s=parseFloat(canvas.style.width)/CW;
  convo.forEach((line,i)=>{
    setTimeout(()=>{
      const agent=AGENTS.find(a=>a.id===line.agent);if(!agent)return;
      agent.speaking=true;
      const bx=rect.left+(agent.x+13)*s - 40;
      const by=rect.top+(agent.y-80)*s;
      const bubble=document.createElement('div');
      bubble.className='chat-bubble';
      bubble.style.left=bx+'px';bubble.style.top=by+'px';
      bubble.innerHTML=`<span class="speaker" style="color:${agent.color}">${agent.name}:</span> ${line.text}`;
      overlay.appendChild(bubble);
      setTimeout(()=>agent.speaking=false,3000);
      setTimeout(()=>{bubble.remove();if(i===convo.length-1)convoActive=false;},5000);
    },i*3500);
  });
}

// ============================================================
// MOVEMENT & RENDER
// ============================================================
function updateAgents(){
  AGENTS.forEach(a=>{
    a.tx=(a.status==='working'||a.status==='thinking')?a.homeX:a.loungeX;
    a.ty=(a.status==='working'||a.status==='thinking')?a.homeY:a.loungeY;
    const dx=a.tx-a.x,dy=a.ty-a.y,dist=Math.sqrt(dx*dx+dy*dy);
    if(dist>1){const spd=Math.min(dist*0.04,3);a.x+=(dx/dist)*spd;a.y+=(dy/dist)*spd;}
    else{a.x=a.tx;a.y=a.ty;}
  });
}

// Tooltip
canvas.addEventListener('mousemove',(e)=>{
  const rect=canvas.getBoundingClientRect();
  const s=parseFloat(canvas.style.width)/CW;
  const mx=(e.clientX-rect.left)/s,my=(e.clientY-rect.top)/s;
  const tip=document.getElementById('tooltip');
  let found=false;
  AGENTS.forEach(a=>{
    if(mx>=a.x-4&&mx<=a.x+30&&my>=a.y-10&&my<=a.y+60){
      tip.style.display='block';tip.style.left=(e.clientX+16)+'px';tip.style.top=(e.clientY-10)+'px';
      tip.innerHTML=`<span class="tt-name">${a.emoji} ${a.name}</span><br><span class="tt-role">${a.role} · ${a.model}</span>${a.task?`<div class="tt-task">📋 ${a.task}</div>`:'<div class="tt-task">☕ Hanging in the lounge</div>'}`;
      found=true;
    }
  });
  if(!found)tip.style.display='none';
});
canvas.addEventListener('mouseleave',()=>{document.getElementById('tooltip').style.display='none';});

async function fetchData(){
  try{
    const res=await fetch('data.json?t='+Date.now());const data=await res.json();
    data.agents.forEach(d=>{const a=AGENTS.find(ag=>ag.id===d.id);if(a){a.status=d.status;a.task=d.task;if(d.model)a.model=d.model;}});
  }catch(e){}
}

let frame=0;

// Slow server light blink (every ~3 seconds, update a few lights)
setInterval(()=>{
  SERVER_LIGHTS.forEach(rack=>{
    rack.forEach(unit=>{
      const idx=Math.floor(Math.random()*4);
      if(Math.random()<0.3){
        unit[idx].on=!unit[idx].on;
      }
      unit[idx].bar=6+Math.floor(Math.random()*20);
    });
  });
  // Redraw static room with updated lights
  drawRoomStatic();
},3000);

function render(){
  frame++;
  // Draw cached room
  ctx.drawImage(roomCanvas, 0, 0);
  updateAgents();
  [...AGENTS].sort((a,b)=>a.y-b.y).forEach(a=>drawAgentSprite(a,frame));
  if(frame%200===0&&Math.random()<0.35)tryConversation();
  requestAnimationFrame(render);
}

function updateClock(){
  const now=new Date();
  document.getElementById('clock').textContent=
    now.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'})+' · '+
    now.toLocaleTimeString('en-US',{hour12:true,hour:'2-digit',minute:'2-digit'})+' · Mill Valley, CA';
}

updateClock();setInterval(updateClock,30000);
fetchData();setInterval(fetchData,5000);
render();
