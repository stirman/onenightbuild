<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agent World — Rosie's Workshop</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Inter:wght@400;600;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0c0c1a;
    font-family: 'Inter', sans-serif;
    overflow: hidden;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }
  .header {
    background: linear-gradient(180deg, #1a1a30, #12122a);
    border-bottom: 2px solid #e94560;
    padding: 10px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    z-index: 10;
    flex-shrink: 0;
  }
  .header h1 {
    font-family: 'Press Start 2P', monospace;
    font-size: 12px;
    color: #e94560;
    text-shadow: 1px 1px 0 #0f3460;
  }
  .header .info {
    font-family: 'Press Start 2P', monospace;
    font-size: 9px;
    color: #6a5a7a;
  }
  .canvas-wrap {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    background: radial-gradient(ellipse at center, #141428, #0a0a18);
  }
  canvas { display: block; }
  #tooltip {
    position: fixed;
    background: rgba(16,16,32,0.95);
    border: 2px solid #e94560;
    backdrop-filter: blur(8px);
    color: #fff;
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    padding: 12px 16px;
    border-radius: 10px;
    pointer-events: none;
    z-index: 100;
    display: none;
    max-width: 300px;
    line-height: 1.7;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
  }
  #tooltip .tt-name { color: #e94560; font-size: 14px; font-weight: 700; }
  #tooltip .tt-role { color: #8888aa; font-size: 11px; }
  #tooltip .tt-task { color: #4ECDC4; margin-top: 6px; font-size: 12px; }
  .chat-bubble {
    position: absolute;
    background: rgba(255,255,255,0.96);
    color: #1a1a2e;
    font-family: 'Inter', sans-serif;
    font-size: 12px;
    font-weight: 500;
    padding: 10px 14px;
    border-radius: 12px 12px 12px 4px;
    max-width: 240px;
    line-height: 1.5;
    box-shadow: 0 4px 16px rgba(0,0,0,0.25);
    animation: bubbleIn 0.3s ease-out, bubbleOut 0.4s ease-in 4.6s forwards;
    word-wrap: break-word;
    pointer-events: none;
  }
  .chat-bubble .speaker { font-weight: 700; margin-bottom: 3px; display: block; font-size: 11px; }
  @keyframes bubbleIn {
    from { opacity: 0; transform: translateY(8px) scale(0.95); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }
  @keyframes bubbleOut { from { opacity: 1; } to { opacity: 0; } }
</style>
</head>
<body>
<div class="header">
  <h1>🤖 AGENT WORLD — Rosie's Workshop</h1>
  <div class="info" id="clock"></div>
</div>
<div class="canvas-wrap"><canvas id="world"></canvas></div>
<div id="tooltip"></div>
<div id="chat-overlay" style="position:fixed;pointer-events:none;z-index:50;"></div>

<script>
const canvas = document.getElementById('world');
const ctx = canvas.getContext('2d');
const CW = 1400, CH = 800;
canvas.width = CW; canvas.height = CH;

function resizeCanvas() {
  const hdr = document.querySelector('.header');
  const s = Math.min(window.innerWidth / CW, (window.innerHeight - hdr.offsetHeight) / CH);
  canvas.style.width = Math.floor(CW * s) + 'px';
  canvas.style.height = Math.floor(CH * s) + 'px';
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

// ============================================================
// ISOMETRIC HELPERS
// ============================================================
// Convert grid coords to screen coords (isometric)
const ISO_ANGLE = Math.PI / 6; // 30 degrees
const TILE = 48;
const OX = CW / 2, OY = 140; // origin offset

function isoToScreen(gx, gy) {
  return {
    x: OX + (gx - gy) * TILE * 0.866,
    y: OY + (gx + gy) * TILE * 0.5
  };
}

// Draw an isometric box
function isoBox(gx, gy, w, d, h, topColor, leftColor, rightColor) {
  const p = isoToScreen(gx, gy);
  const tw = w * TILE * 0.866;
  const td = d * TILE * 0.866;
  const th = h * TILE * 0.5;
  const hw = w * TILE * 0.5;
  const hd = d * TILE * 0.5;

  // Top face
  ctx.fillStyle = topColor;
  ctx.beginPath();
  ctx.moveTo(p.x, p.y - th);
  ctx.lineTo(p.x + tw, p.y + hw - th);
  ctx.lineTo(p.x + tw - td, p.y + hw + hd - th);
  ctx.lineTo(p.x - td, p.y + hd - th);
  ctx.closePath();
  ctx.fill();

  // Left face
  ctx.fillStyle = leftColor;
  ctx.beginPath();
  ctx.moveTo(p.x - td, p.y + hd - th);
  ctx.lineTo(p.x + tw - td, p.y + hw + hd - th);
  ctx.lineTo(p.x + tw - td, p.y + hw + hd);
  ctx.lineTo(p.x - td, p.y + hd);
  ctx.closePath();
  ctx.fill();

  // Right face
  ctx.fillStyle = rightColor;
  ctx.beginPath();
  ctx.moveTo(p.x, p.y - th);
  ctx.lineTo(p.x - td, p.y + hd - th);
  ctx.lineTo(p.x - td, p.y + hd);
  ctx.lineTo(p.x, p.y);
  ctx.closePath();
  ctx.fill();
}

// Draw isometric floor tile
function isoFloorTile(gx, gy, color) {
  const p = isoToScreen(gx, gy);
  const tw = TILE * 0.866;
  const th = TILE * 0.5;
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.moveTo(p.x, p.y);
  ctx.lineTo(p.x + tw, p.y + th);
  ctx.lineTo(p.x, p.y + th * 2);
  ctx.lineTo(p.x - tw, p.y + th);
  ctx.closePath();
  ctx.fill();
}

// Isometric rectangle on floor
function isoFloorRect(gx, gy, w, d, color) {
  const p = isoToScreen(gx, gy);
  const tw = TILE * 0.866;
  const th = TILE * 0.5;
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.moveTo(p.x, p.y);
  ctx.lineTo(p.x + w * tw, p.y + w * th);
  ctx.lineTo(p.x + (w - d) * tw, p.y + (w + d) * th);
  ctx.lineTo(p.x - d * tw, p.y + d * th);
  ctx.closePath();
  ctx.fill();
}

// ============================================================
// STATIC ROOM (cached)
// ============================================================
const roomCanvas = document.createElement('canvas');
roomCanvas.width = CW; roomCanvas.height = CH;
const rc = roomCanvas.getContext('2d');

function drawStaticRoom() {
  const _ctx = ctx;
  // Temporarily swap
  const origCtx = ctx;

  // We'll just draw straight to rc
  // Background gradient
  const bg = rc.createRadialGradient(CW/2, CH/2, 100, CW/2, CH/2, 700);
  bg.addColorStop(0, '#1e1e38');
  bg.addColorStop(1, '#0c0c1a');
  rc.fillStyle = bg;
  rc.fillRect(0, 0, CW, CH);

  // We need a helper that uses rc
  function rIsoFloor(gx, gy, color) {
    const p = isoToScreen(gx, gy);
    const tw = TILE * 0.866;
    const th = TILE * 0.5;
    rc.fillStyle = color;
    rc.beginPath();
    rc.moveTo(p.x, p.y);
    rc.lineTo(p.x + tw, p.y + th);
    rc.lineTo(p.x, p.y + th * 2);
    rc.lineTo(p.x - tw, p.y + th);
    rc.closePath();
    rc.fill();
  }

  function rIsoBox(gx, gy, w, d, h, tc, lc, ric) {
    const p = isoToScreen(gx, gy);
    const tw = w * TILE * 0.866;
    const td = d * TILE * 0.866;
    const th = h * TILE * 0.5;
    const hw = w * TILE * 0.5;
    const hd = d * TILE * 0.5;
    // Top
    rc.fillStyle = tc;
    rc.beginPath();
    rc.moveTo(p.x, p.y - th);
    rc.lineTo(p.x + tw, p.y + hw - th);
    rc.lineTo(p.x + tw - td, p.y + hw + hd - th);
    rc.lineTo(p.x - td, p.y + hd - th);
    rc.closePath(); rc.fill();
    // Front left
    rc.fillStyle = lc;
    rc.beginPath();
    rc.moveTo(p.x - td, p.y + hd - th);
    rc.lineTo(p.x + tw - td, p.y + hw + hd - th);
    rc.lineTo(p.x + tw - td, p.y + hw + hd);
    rc.lineTo(p.x - td, p.y + hd);
    rc.closePath(); rc.fill();
    // Front right
    rc.fillStyle = ric;
    rc.beginPath();
    rc.moveTo(p.x, p.y - th);
    rc.lineTo(p.x - td, p.y + hd - th);
    rc.lineTo(p.x - td, p.y + hd);
    rc.lineTo(p.x, p.y);
    rc.closePath(); rc.fill();
  }

  function rIsoFloorRect(gx, gy, w, d, color) {
    const p = isoToScreen(gx, gy);
    const tw = TILE * 0.866;
    const th = TILE * 0.5;
    rc.fillStyle = color;
    rc.beginPath();
    rc.moveTo(p.x, p.y);
    rc.lineTo(p.x + w * tw, p.y + w * th);
    rc.lineTo(p.x + (w - d) * tw, p.y + (w + d) * th);
    rc.lineTo(p.x - d * tw, p.y + d * th);
    rc.closePath(); rc.fill();
  }

  // ---- FLOOR ----
  for (let gy = 0; gy < 14; gy++) {
    for (let gx = 0; gx < 16; gx++) {
      const checker = (gx + gy) % 2 === 0;
      rIsoFloor(gx, gy, checker ? '#b89870' : '#c4a882');
      // Wood grain lines
      const p = isoToScreen(gx, gy);
      rc.strokeStyle = checker ? 'rgba(0,0,0,0.06)' : 'rgba(255,255,255,0.04)';
      rc.lineWidth = 0.5;
      rc.beginPath();
      rc.moveTo(p.x - 15, p.y + 8);
      rc.lineTo(p.x + 20, p.y + 18);
      rc.stroke();
    }
  }

  // ---- RUGS ----
  // Lounge rug
  rIsoFloorRect(1, 8, 5, 5, 'rgba(140,50,50,0.4)');
  rIsoFloorRect(1.1, 8.1, 4.8, 4.8, 'rgba(160,60,60,0.35)');
  rIsoFloorRect(1.3, 8.3, 4.4, 4.4, 'rgba(180,70,70,0.3)');

  // Desk area rug
  rIsoFloorRect(6, 2, 6, 5, 'rgba(60,80,100,0.25)');

  // ---- BACK WALL (implied by shadow / gradient) ----
  // Wall shadow along back
  for (let gx = 0; gx < 16; gx++) {
    const p = isoToScreen(gx, 0);
    const g = rc.createLinearGradient(p.x, p.y - 30, p.x, p.y + 20);
    g.addColorStop(0, 'rgba(80,100,130,0.4)');
    g.addColorStop(1, 'rgba(0,0,0,0)');
    rc.fillStyle = g;
    rc.fillRect(p.x - 50, p.y - 30, 100, 50);
  }

  // ---- WALLS (isometric back walls) ----
  // Left wall
  const wallH = 180;
  rc.fillStyle = '#5a7a9a';
  rc.beginPath();
  const wl0 = isoToScreen(0, 0);
  const wl1 = isoToScreen(0, 14);
  rc.moveTo(wl0.x, wl0.y);
  rc.lineTo(wl0.x, wl0.y - wallH);
  rc.lineTo(wl1.x, wl1.y - wallH);
  rc.lineTo(wl1.x, wl1.y);
  rc.closePath(); rc.fill();
  // Wall gradient
  const wlg = rc.createLinearGradient(wl0.x, wl0.y - wallH, wl1.x, wl1.y);
  wlg.addColorStop(0, 'rgba(100,130,160,0.3)');
  wlg.addColorStop(1, 'rgba(40,60,80,0.3)');
  rc.fillStyle = wlg;
  rc.fill();

  // Back wall
  rc.fillStyle = '#6a8aaa';
  rc.beginPath();
  const wb0 = isoToScreen(0, 0);
  const wb1 = isoToScreen(16, 0);
  rc.moveTo(wb0.x, wb0.y);
  rc.lineTo(wb0.x, wb0.y - wallH);
  rc.lineTo(wb1.x, wb1.y - wallH);
  rc.lineTo(wb1.x, wb1.y);
  rc.closePath(); rc.fill();
  const wbg = rc.createLinearGradient(wb0.x, wb0.y - wallH, wb0.x, wb0.y);
  wbg.addColorStop(0, 'rgba(120,150,180,0.2)');
  wbg.addColorStop(1, 'rgba(0,0,0,0.1)');
  rc.fillStyle = wbg;
  rc.fill();

  // ---- WINDOWS on back wall ----
  function drawWindow(gx) {
    const p = isoToScreen(gx, 0);
    const p2 = isoToScreen(gx + 2, 0);
    const wx = p.x, wy = p.y - wallH + 30;
    const ww = p2.x - p.x, wh = 90;
    // Frame
    rc.fillStyle = '#3a5a7a';
    rc.fillRect(wx - 4, wy - 4, ww + 8, wh + 8);
    // Glass
    const gg = rc.createLinearGradient(wx, wy, wx, wy + wh);
    gg.addColorStop(0, '#88c8e8');
    gg.addColorStop(0.5, '#a8ddf8');
    gg.addColorStop(1, '#78b8d8');
    rc.fillStyle = gg;
    rc.fillRect(wx, wy, ww, wh);
    // Clouds
    rc.fillStyle = 'rgba(255,255,255,0.4)';
    rc.beginPath(); rc.ellipse(wx + ww * 0.3, wy + 20, 20, 8, 0, 0, Math.PI * 2); rc.fill();
    rc.beginPath(); rc.ellipse(wx + ww * 0.7, wy + 35, 16, 6, 0, 0, Math.PI * 2); rc.fill();
    // Cross pane
    rc.fillStyle = '#3a5a7a';
    rc.fillRect(wx + ww/2 - 2, wy, 4, wh);
    rc.fillRect(wx, wy + wh/2 - 2, ww, 4);
    // Light reflection
    rc.fillStyle = 'rgba(255,255,255,0.12)';
    rc.fillRect(wx + 4, wy + 4, ww/2 - 8, wh/3);
    // Light cast on floor
    const lp = isoToScreen(gx + 0.5, 1);
    rc.fillStyle = 'rgba(200,220,240,0.06)';
    rc.beginPath(); rc.ellipse(lp.x, lp.y, 60, 30, 0, 0, Math.PI * 2); rc.fill();
  }
  drawWindow(2);
  drawWindow(6);
  drawWindow(10);
  drawWindow(14);

  // ---- WINDOWS on left wall ----
  function drawSideWindow(gy) {
    const p = isoToScreen(0, gy);
    const wx = p.x - 60, wy = p.y - wallH + 40;
    rc.fillStyle = '#3a5a7a';
    rc.fillRect(wx - 3, wy - 3, 46, 66);
    const gg = rc.createLinearGradient(wx, wy, wx, wy + 60);
    gg.addColorStop(0, '#78b8d8');
    gg.addColorStop(1, '#98d0e8');
    rc.fillStyle = gg;
    rc.fillRect(wx, wy, 40, 60);
    rc.fillStyle = '#3a5a7a';
    rc.fillRect(wx + 18, wy, 4, 60);
    rc.fillRect(wx, wy + 28, 40, 4);
  }
  drawSideWindow(3);
  drawSideWindow(8);

  // ---- FURNITURE ----

  // LOUNGE COUCHES
  function drawCouch(gx, gy, facing) {
    rIsoBox(gx, gy, 3, 1.2, 0.8, '#6a4a7a', '#5a3a6a', '#4a2a5a');
    // Cushions
    rIsoBox(gx + 0.1, gy + 0.15, 0.9, 0.9, 0.9, '#8a6a9a', '#7a5a8a', '#6a4a7a');
    rIsoBox(gx + 1.05, gy + 0.15, 0.9, 0.9, 0.9, '#8a6a9a', '#7a5a8a', '#6a4a7a');
    rIsoBox(gx + 2.0, gy + 0.15, 0.9, 0.9, 0.9, '#8a6a9a', '#7a5a8a', '#6a4a7a');
    // Pillows
    rIsoBox(gx + 0.2, gy + 0.25, 0.5, 0.5, 1.05, '#d088b0', '#c078a0', '#b06890');
    rIsoBox(gx + 2.3, gy + 0.25, 0.5, 0.5, 1.05, '#88b0d0', '#78a0c0', '#6890b0');
  }
  drawCouch(1, 8.5);
  drawCouch(1, 11);

  // Coffee table
  rIsoBox(2, 10, 2, 1, 0.5, '#a08060', '#8a6a4a', '#7a5a3a');
  // Items on table
  rIsoBox(2.2, 10.1, 0.4, 0.3, 0.55, '#e84848', '#d03838', '#c02828'); // book
  rIsoBox(3.2, 10.2, 0.2, 0.2, 0.6, '#e8e8e8', '#d8d8d8', '#c8c8c8'); // mug
  rIsoBox(2.8, 10.3, 0.3, 0.2, 0.55, '#4888c8', '#3878b8', '#2868a8'); // phone

  // Floor lamp
  rIsoBox(0.8, 8, 0.3, 0.3, 2.5, '#e8d888', '#d8c878', '#c8b868');

  // CODE DESK
  rIsoBox(7, 2.5, 2.5, 1.2, 0.9, '#b08858', '#9a7248', '#8a6238');
  // Monitor
  rIsoBox(7.5, 2.7, 1.2, 0.15, 1.7, '#222', '#1a1a2a', '#111');
  // Screen glow
  const mp = isoToScreen(7.6, 2.72);
  rc.fillStyle = 'rgba(80,200,140,0.15)';
  rc.beginPath(); rc.ellipse(mp.x + 20, mp.y - 30, 25, 15, 0, 0, Math.PI * 2); rc.fill();
  // Keyboard
  rIsoBox(7.8, 3.2, 0.8, 0.4, 0.92, '#3a3a3a', '#2a2a2a', '#222');
  // Energy drink
  rIsoBox(9.2, 2.6, 0.15, 0.15, 1.1, '#48e848', '#38c838', '#28a828');
  // Rubber duck
  rIsoBox(7.1, 3.3, 0.2, 0.2, 1.0, '#FFD700', '#e8c000', '#d8b000');

  // RESEARCH DESK
  rIsoBox(10, 2.5, 2.5, 1.2, 0.9, '#b08858', '#9a7248', '#8a6238');
  rIsoBox(10.5, 2.7, 1.2, 0.15, 1.7, '#222', '#1a1a2a', '#111');
  const rp = isoToScreen(10.6, 2.72);
  rc.fillStyle = 'rgba(200,200,80,0.12)';
  rc.beginPath(); rc.ellipse(rp.x + 20, rp.y - 30, 25, 15, 0, 0, Math.PI * 2); rc.fill();
  rIsoBox(10.8, 3.2, 0.8, 0.4, 0.92, '#3a3a3a', '#2a2a2a', '#222');
  // Notebooks
  rIsoBox(12.1, 2.6, 0.4, 0.3, 0.95, '#4888c8', '#3878b8', '#2868a8');
  rIsoBox(12.0, 2.9, 0.35, 0.25, 0.93, '#c84848', '#b83838', '#a82828');
  // Globe
  const gp = isoToScreen(12.3, 3.3);
  rc.fillStyle = '#4888c8';
  rc.beginPath(); rc.arc(gp.x, gp.y - 15, 10, 0, Math.PI * 2); rc.fill();
  rc.fillStyle = '#48a848';
  rc.beginPath(); rc.arc(gp.x - 3, gp.y - 17, 5, 0, Math.PI); rc.fill();

  // DESIGN AREA
  // Easel
  rIsoBox(13.5, 4, 1, 0.3, 2.5, '#f0e8d8', '#e0d0c0', '#d0c0b0');
  rIsoBox(13.5, 4, 1, 0.3, 2.6, '#8a6a40', '#7a5a30', '#6a4a20'); // frame only top
  // Desk
  rIsoBox(13, 5.5, 2, 1, 0.9, '#b08858', '#9a7248', '#8a6238');
  rIsoBox(13.3, 5.7, 1, 0.15, 1.7, '#222', '#1a1a2a', '#111');
  // Drawing tablet
  rIsoBox(14.2, 5.8, 0.6, 0.4, 0.95, '#2a2a3a', '#222238', '#1a1a28');
  // Paint palette
  const pp = isoToScreen(14.6, 6.3);
  rc.fillStyle = '#d8c8a8';
  rc.beginPath(); rc.ellipse(pp.x, pp.y, 12, 8, 0, 0, Math.PI * 2); rc.fill();
  ['#e84848','#4888c8','#48a848','#e8c848','#a848a8'].forEach((c, i) => {
    rc.fillStyle = c;
    rc.beginPath(); rc.arc(pp.x - 6 + i * 4, pp.y - 2 + (i%2)*3, 2.5, 0, Math.PI * 2); rc.fill();
  });

  // ROSIE'S DESK (center, larger)
  rIsoBox(6, 7, 3.5, 1.5, 0.9, '#a07850', '#8a6840', '#7a5830');
  // Dual monitors
  rIsoBox(6.5, 7.2, 1, 0.12, 1.8, '#222', '#1a1a2a', '#111');
  rIsoBox(7.8, 7.2, 1, 0.12, 1.8, '#222', '#1a1a2a', '#111');
  const rmp = isoToScreen(6.6, 7.22);
  rc.fillStyle = 'rgba(160,120,200,0.12)';
  rc.beginPath(); rc.ellipse(rmp.x + 15, rmp.y - 30, 20, 12, 0, 0, Math.PI * 2); rc.fill();
  // Nameplate
  rIsoBox(7.5, 8.0, 0.8, 0.2, 0.95, '#d8b050', '#c8a040', '#b89030');
  // Mug
  rIsoBox(9.1, 7.3, 0.2, 0.2, 1.05, '#FF6B9D', '#e05a88', '#d04a78');
  // Succulent
  const sp = isoToScreen(6.2, 8.2);
  rc.fillStyle = '#48a848';
  rc.beginPath(); rc.arc(sp.x, sp.y - 12, 8, 0, Math.PI * 2); rc.fill();
  rc.fillStyle = '#b86838';
  rc.fillRect(sp.x - 5, sp.y - 5, 10, 8);

  // SERVER RACKS
  rIsoBox(14, 1, 0.8, 0.8, 3, '#2a2a3a', '#222238', '#1a1a28');
  rIsoBox(14.9, 1, 0.8, 0.8, 3, '#2a2a3a', '#222238', '#1a1a28');
  // Server lights (static, pre-baked)
  [14, 14.9].forEach(sx => {
    for (let i = 0; i < 5; i++) {
      const lp = isoToScreen(sx + 0.15, 1.05);
      const ly = lp.y - 55 + i * 14;
      rc.fillStyle = (i + sx * 3) % 3 === 0 ? '#e84848' : '#48e848';
      rc.beginPath(); rc.arc(lp.x + 5, ly, 2.5, 0, Math.PI * 2); rc.fill();
      rc.fillStyle = (i + sx * 2) % 2 === 0 ? '#48e848' : '#1a1a1a';

function drawAgent(a, frame) {
  const x = Math.round(a.x), y = Math.round(a.y);
  const working = a.status === 'working';
  const bob = working ? Math.sin(frame * 0.08) * 1.5 : 0;
  const ay = y + bob;
  const sc = 1.1; // sprite scale

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.18)';
  ctx.beginPath(); ctx.ellipse(x, y + 4, 18 * sc, 7 * sc, 0, 0, Math.PI * 2); ctx.fill();

  const walking = Math.abs(a.x - a.tx) > 3 || Math.abs(a.y - a.ty) > 3;
  const legOff = walking ? Math.sin(frame * 0.2) * 3 : 0;

  // Legs
  ctx.fillStyle = a.colorDark;
  ctx.fillRect(x - 5*sc, ay - 8 + legOff, 6*sc, 12);
  ctx.fillRect(x + 1*sc, ay - 8 - legOff, 6*sc, 12);
  // Shoes
  ctx.fillStyle = '#2a2020';
  ctx.fillRect(x - 6*sc, ay + 2 + legOff, 8*sc, 4);
  ctx.fillRect(x + 0*sc, ay + 2 - legOff, 8*sc, 4);

  // Body
  ctx.fillStyle = a.color;
  ctx.beginPath();
  ctx.roundRect(x - 10*sc, ay - 24, 22*sc, 18*sc, 3);
  ctx.fill();
  // Collar
  ctx.fillStyle = lightenHex(a.color, 30);
  ctx.fillRect(x - 8*sc, ay - 24, 18*sc, 3);

  // Arms
  const armB = working ? Math.sin(frame * 0.15) * 2 : 0;
  ctx.fillStyle = a.color;
  ctx.fillRect(x - 13*sc, ay - 22 + armB, 5*sc, 14);
  ctx.fillRect(x + 10*sc, ay - 22 - armB, 5*sc, 14);
  ctx.fillStyle = a.skin;
  ctx.fillRect(x - 13*sc, ay - 10 + armB, 5*sc, 5);
  ctx.fillRect(x + 10*sc, ay - 10 - armB, 5*sc, 5);

  // Head
  ctx.fillStyle = a.skin;
  ctx.beginPath();
  ctx.roundRect(x - 9*sc, ay - 44, 20*sc, 21*sc, 4);
  ctx.fill();

  // Ears
  ctx.beginPath(); ctx.ellipse(x - 10*sc, ay - 34, 3, 4, 0, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(x + 12*sc, ay - 34, 3, 4, 0, 0, Math.PI * 2); ctx.fill();

  // Hair
  ctx.fillStyle = a.hair;
  if (a.hairStyle === 'ponytail') {
    ctx.beginPath(); ctx.roundRect(x - 10*sc, ay - 48, 22*sc, 12, 4); ctx.fill();
    ctx.fillRect(x - 10*sc, ay - 42, 4, 10);
    ctx.fillRect(x + 9*sc, ay - 42, 4, 10);
    ctx.fillRect(x + 12*sc, ay - 40, 8, 16); // ponytail
    ctx.fillStyle = lightenHex(a.hair, 25);
    ctx.fillRect(x - 4*sc, ay - 47, 8, 2);
  } else if (a.hairStyle === 'long') {
    ctx.beginPath(); ctx.roundRect(x - 11*sc, ay - 48, 24*sc, 12, 4); ctx.fill();
    ctx.fillRect(x - 12*sc, ay - 42, 6, 20);
    ctx.fillRect(x + 9*sc, ay - 42, 6, 20);
    ctx.fillStyle = lightenHex(a.hair, 20);
    ctx.fillRect(x - 4*sc, ay - 47, 6, 2);
  } else if (a.hairStyle === 'short') {
    ctx.beginPath(); ctx.roundRect(x - 10*sc, ay - 49, 22*sc, 12, 4); ctx.fill();
    ctx.fillRect(x - 10*sc, ay - 42, 4, 6);
    ctx.fillRect(x + 9*sc, ay - 42, 4, 6);
    ctx.fillStyle = lightenHex(a.hair, 20);
    ctx.fillRect(x - 2*sc, ay - 48, 6, 2);
  } else if (a.hairStyle === 'spiky') {
    ctx.beginPath(); ctx.roundRect(x - 10*sc, ay - 48, 22*sc, 10, 3); ctx.fill();
    ctx.fillRect(x - 6*sc, ay - 54, 5, 8);
    ctx.fillRect(x + 0, ay - 56, 5, 10);
    ctx.fillRect(x + 6*sc, ay - 52, 5, 6);
    ctx.fillStyle = lightenHex(a.hair, 25);
    ctx.fillRect(x - 2*sc, ay - 47, 6, 2);
  }

  // Eyes
  const blink = frame % 180 < 4;
  if (!blink) {
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.ellipse(x - 4*sc, ay - 35, 4, 4, 0, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(x + 6*sc, ay - 35, 4, 4, 0, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#1a1a2e';
    ctx.beginPath(); ctx.arc(x - 3*sc, ay - 34, 2.5, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(x + 7*sc, ay - 34, 2.5, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(x - 4*sc, ay - 36, 1.2, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(x + 6*sc, ay - 36, 1.2, 0, Math.PI * 2); ctx.fill();
  } else {
    ctx.fillStyle = '#1a1a2e';
    ctx.fillRect(x - 7*sc, ay - 34, 8, 2);
    ctx.fillRect(x + 3*sc, ay - 34, 8, 2);
  }

  // Eyebrows
  ctx.fillStyle = a.hair;
  ctx.fillRect(x - 7*sc, ay - 40, 7, 2);
  ctx.fillRect(x + 3*sc, ay - 40, 7, 2);

  // Mouth
  if (a.speaking && frame % 20 < 10) {
    ctx.fillStyle = '#c07070';
    ctx.beginPath(); ctx.ellipse(x + 1*sc, ay - 27, 4, 3, 0, 0, Math.PI * 2); ctx.fill();
  } else {
    ctx.fillStyle = '#c08080';
    ctx.fillRect(x - 2*sc, ay - 28, 7, 2);
  }

  // Cheeks for women
  if (a.hairStyle === 'ponytail' || a.hairStyle === 'long') {
    ctx.fillStyle = 'rgba(255,140,140,0.2)';
    ctx.beginPath(); ctx.ellipse(x - 6*sc, ay - 30, 4, 2.5, 0, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(x + 8*sc, ay - 30, 4, 2.5, 0, 0, Math.PI * 2); ctx.fill();
  }

  // Status dot
  const statusCol = a.status === 'working' ? '#48e848' : a.status === 'thinking' ? '#e8e848' : '#555';
  ctx.fillStyle = statusCol;
  ctx.beginPath(); ctx.arc(x + 12*sc, ay - 46, 4, 0, Math.PI * 2); ctx.fill();
  if (a.status === 'working' && frame % 30 < 15) {
    ctx.fillStyle = lightenHex(statusCol, 50);
    ctx.beginPath(); ctx.arc(x + 12*sc, ay - 46, 2.5, 0, Math.PI * 2); ctx.fill();
  }

  // Emoji
  ctx.font = '14px serif';
  ctx.fillText(a.emoji, x - 6, ay - 56);

  // Name
  ctx.fillStyle = a.color;
  ctx.font = '600 10px Inter, sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText(a.name, x + 1, y + 18);
  ctx.textAlign = 'left';
}

let convoActive=false,lastConvoTime=0,viewerPresent=true,viewerTimeout=null;
document.addEventListener('mousemove',rv);document.addEventListener('click',rv);
function rv(){viewerPresent=true;clearTimeout(viewerTimeout);viewerTimeout=setTimeout(()=>viewerPresent=false,60000);}
viewerTimeout=setTimeout(()=>viewerPresent=false,60000);

function tryConvo(){
  if(convoActive||!viewerPresent||Date.now()-lastConvoTime<20000)return;
  const idle=AGENTS.filter(a=>a.status==='idle');
  if(idle.length<2)return;
  const convo=CONVERSATIONS[Math.floor(Math.random()*CONVERSATIONS.length)];
  if(![...new Set(convo.map(c=>c.agent))].every(id=>AGENTS.find(a=>a.id===id&&a.status==='idle')))return;
  convoActive=true;lastConvoTime=Date.now();
  const overlay=document.getElementById('chat-overlay');
  const rect=canvas.getBoundingClientRect();
  const s=parseFloat(canvas.style.width)/CW;
  convo.forEach((line,i)=>{
    setTimeout(()=>{
      const agent=AGENTS.find(a=>a.id===line.agent);if(!agent)return;
      agent.speaking=true;
      // Position bubble well ABOVE the agent's head
      const bx=rect.left+agent.x*s - 40;
      const by=rect.top+(agent.y - 90)*s;
      const bubble=document.createElement('div');
      bubble.className='chat-bubble';
      bubble.style.left=Math.max(10, bx)+'px';
      bubble.style.top=Math.max(10, by)+'px';
      bubble.innerHTML=`<span class="speaker" style="color:${agent.color}">${agent.name}:</span> ${line.text}`;
      overlay.appendChild(bubble);
      setTimeout(()=>agent.speaking=false,3000);
      setTimeout(()=>{bubble.remove();if(i===convo.length-1)convoActive=false;},5000);
    },i*3500);
  });
}

// ============================================================
// UPDATE & RENDER
// ============================================================
function updateAgents(){
  AGENTS.forEach(a=>{
    const isWorking = a.status==='working'||a.status==='thinking';
    const tg = isWorking ? isoToScreen(a.homeGx, a.homeGy) : isoToScreen(a.loungeGx, a.loungeGy);
    a.tx=tg.x; a.ty=tg.y;
    const dx=a.tx-a.x,dy=a.ty-a.y,dist=Math.sqrt(dx*dx+dy*dy);
    if(dist>1.5){const spd=Math.min(dist*0.04,2.5);a.x+=(dx/dist)*spd;a.y+=(dy/dist)*spd;}
    else{a.x=a.tx;a.y=a.ty;}
  });
}

canvas.addEventListener('mousemove',(e)=>{
  const rect=canvas.getBoundingClientRect();
  const s=parseFloat(canvas.style.width)/CW;
  const mx=(e.clientX-rect.left)/s,my=(e.clientY-rect.top)/s;
  const tip=document.getElementById('tooltip');
  let found=false;
  AGENTS.forEach(a=>{
    if(mx>=a.x-20&&mx<=a.x+20&&my>=a.y-60&&my<=a.y+20){
      tip.style.display='block';tip.style.left=(e.clientX+16)+'px';tip.style.top=(e.clientY-10)+'px';
      tip.innerHTML=`<span class="tt-name">${a.emoji} ${a.name}</span><br><span class="tt-role">${a.role} · ${a.model}</span>${a.task?`<div class="tt-task">📋 ${a.task}</div>`:'<div class="tt-task">☕ Hanging in the lounge</div>'}`;
      found=true;
    }
  });
  if(!found)tip.style.display='none';
});
canvas.addEventListener('mouseleave',()=>document.getElementById('tooltip').style.display='none');

async function fetchData(){
  try{const res=await fetch('data.json?t='+Date.now());const data=await res.json();
    data.agents.forEach(d=>{const a=AGENTS.find(ag=>ag.id===d.id);if(a){a.status=d.status;a.task=d.task;if(d.model)a.model=d.model;}});
  }catch(e){}
}

let frame=0;
function render(){
  frame++;
  ctx.drawImage(roomCanvas,0,0);
  updateAgents();
  [...AGENTS].sort((a,b)=>a.y-b.y).forEach(a=>drawAgent(a,frame));
  if(frame%200===0&&Math.random()<0.35)tryConvo();
  requestAnimationFrame(render);
}

function updateClock(){
  document.getElementById('clock').textContent=
    new Date().toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'})+' · '+
    new Date().toLocaleTimeString('en-US',{hour12:true,hour:'2-digit',minute:'2-digit'})+' · Mill Valley, CA';
}

updateClock();setInterval(updateClock,30000);
fetchData();setInterval(fetchData,5000);
render();
